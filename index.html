<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="da" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<link rel="icon" type="image/png" href="./favicon.png" />
<meta name="color-scheme" content="dark light" />
<meta name="theme-color" content="#0B0B12" />
<title>da</title>
<style>
  :root{
    /* Default = Dark/Neon */
    --bg:#0B0B12;
    --surface:#14141F;
    --surface-2:#1E1E2E;
    --fg:#F2F3F7;
    --accent:#CBFF3B;
    --accent-2:#FF4D8D;
    --gps:#CBFF3B;
    --muted:#8A8CA0;
    --muted-2:#26263A;
    --hairline:#2C2C40;
    --danger:#FF4D8D;
    --warn:#FFB454;
    --glow:rgba(203,255,59,.40);
    --r-lg:24px;
    --r-sm:14px;
    --r-pill:999px;
    --safe-t:env(safe-area-inset-top);
    --safe-b:env(safe-area-inset-bottom);
  }
  /* Light = Graphit/Grau, harte Kanten */
  @media (prefers-color-scheme: light){
    :root:not([data-theme]){
      --bg:#E9EAEC;
      --surface:#F4F5F7;
      --surface-2:#DCDDE1;
      --fg:#191A1D;
      --accent:#2C2E33;
      --accent-2:#2C2E33;
      --gps:#3E6B4F;
      --muted:#6E7176;
      --muted-2:#CDCFD4;
      --hairline:#C4C6CC;
      --danger:#D24B41;
      --warn:#8A5A00;
      --glow:transparent;
      --r-lg:0px;
      --r-sm:0px;
      --r-pill:0px;
    }
  }
  :root[data-theme="light"]{
    --bg:#E9EAEC;
    --surface:#F4F5F7;
    --surface-2:#DCDDE1;
    --fg:#191A1D;
    --accent:#2C2E33;
    --accent-2:#2C2E33;
    --gps:#3E6B4F;
    --muted:#6E7176;
    --muted-2:#CDCFD4;
    --hairline:#C4C6CC;
    --danger:#D24B41;
    --warn:#8A5A00;
    --glow:transparent;
    --r-lg:0px;
    --r-sm:0px;
    --r-pill:0px;
  }
  :root[data-theme="dark"]{
    --bg:#0B0B12;
    --surface:#14141F;
    --surface-2:#1E1E2E;
    --fg:#F2F3F7;
    --accent:#CBFF3B;
    --accent-2:#FF4D8D;
    --gps:#CBFF3B;
    --muted:#8A8CA0;
    --muted-2:#26263A;
    --hairline:#2C2C40;
    --danger:#FF4D8D;
    --warn:#FFB454;
    --glow:rgba(203,255,59,.40);
    --r-lg:24px;
    --r-sm:14px;
    --r-pill:999px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    display:flex;flex-direction:column;
    padding:var(--safe-t) 0 var(--safe-b);
  }
  button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer;}
  .eyebrow{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);font-weight:600;
  }

  /* ---------- Update-Banner ---------- */
  #updateBanner{
    position:fixed;top:0;left:0;right:0;z-index:1000;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:calc(var(--safe-t) + 10px) 18px 10px;
    background:var(--surface-2);border-bottom:1px solid var(--hairline);
    transform:translateY(-100%);transition:transform .25s ease;
  }
  #updateBanner.show{transform:translateY(0);}
  #updateBanner span{font-size:12px;color:var(--fg);letter-spacing:.02em;}
  #updateBanner button{
    background:var(--accent);color:var(--bg);font-weight:700;
    font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    border-radius:var(--r-sm);padding:7px 14px;flex:0 0 auto;
  }
  body.has-banner #search{padding-top:calc(var(--safe-t) + 62px);transition:padding-top .25s ease;}
  body.has-banner #nav{padding-top:calc(var(--safe-t) + 76px);transition:padding-top .25s ease;}

  #themeToggle{
    position:fixed;top:calc(var(--safe-t) + 10px);left:14px;
    z-index:20;width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:color-mix(in srgb, var(--surface) 88%, transparent);
    border:1px solid var(--hairline);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    transition:background .2s ease,border-color .2s ease;
  }
  #themeToggle:active{transform:scale(.94);}
  #themeToggle svg{width:18px;height:18px;stroke:var(--fg);fill:none;stroke-width:1.6;}
  #themeToggle .icon-moon{display:none;}
  :root[data-theme="light"] #themeToggle .icon-sun{display:none;}
  :root[data-theme="light"] #themeToggle .icon-moon{display:block;}
  @media (prefers-color-scheme: light){
    :root:not([data-theme]) #themeToggle .icon-sun{display:none;}
    :root:not([data-theme]) #themeToggle .icon-moon{display:block;}
  }

  #reloadTopBtn{
    position:fixed;top:calc(var(--safe-t) + 10px);left:58px;
    z-index:20;width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:color-mix(in srgb, var(--surface) 88%, transparent);
    border:1px solid var(--hairline);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    transition:background .2s ease,transform .2s ease;
  }
  #reloadTopBtn:active{transform:scale(.94) rotate(-25deg);}
  #reloadTopBtn svg{width:17px;height:17px;stroke:var(--fg);fill:none;stroke-width:1.8;}

  .nav-top{position:relative;}
  #closeNavBtn{
    position:fixed;top:calc(var(--safe-t) + 10px);right:14px;
    z-index:20;width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:color-mix(in srgb, var(--surface) 88%, transparent);
    border:1px solid var(--hairline);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    transition:background .2s ease,transform .2s ease;
  }
  #closeNavBtn:active{background:var(--surface-2);transform:scale(.94);}
  #closeNavBtn svg{width:15px;height:15px;stroke:var(--fg);fill:none;stroke-width:2;}

  #versionTag{
    position:fixed;left:0;right:0;bottom:calc(var(--safe-b) + 10px);
    text-align:center;font-size:9.5px;letter-spacing:.08em;
    color:var(--muted);opacity:.55;pointer-events:none;z-index:5;
    padding-top:10px;
  }

  /* ---------- Views ---------- */
  .view{position:absolute;inset:0;display:none;flex-direction:column;}
  .view.active{display:flex;}

  /* ---------- Search ---------- */
  #search{padding:calc(var(--safe-t) + 8px) 22px calc(var(--safe-b) + 34px);overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .search-inner{width:100%;max-width:440px;margin:auto;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:30px;}
  .brand-mark{width:24px;height:24px;flex:0 0 auto;}
  .brand-mark svg{width:100%;height:100%;display:block;}
  .brand-name{font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
  h1{font-size:22px;line-height:1.3;margin:0 0 8px;font-weight:700;letter-spacing:-.01em;
     font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .sub{color:var(--muted);font-size:14px;line-height:1.55;margin:0 0 26px;
       font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .field{display:flex;gap:10px;}
  input[type=text]{
    flex:1;min-width:0;background:var(--surface);color:var(--fg);
    border:1px solid var(--hairline);border-radius:var(--r-sm);
    padding:15px 16px;font-size:16px;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    outline:none;transition:border-color .15s ease;
  }
  input[type=text]:focus{border-color:var(--accent);}
  input::placeholder{color:var(--muted);}
  .btn-go{
    flex:0 0 auto;background:var(--accent);color:var(--bg);
    border-radius:var(--r-sm);padding:0 20px;font-size:14px;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;
    transition:opacity .15s ease,transform .08s ease;
  }
  .btn-go:active{transform:scale(.97);}
  .btn-go[disabled]{opacity:.45;pointer-events:none;}

  .results{list-style:none;margin:18px 0 0;padding:0;}
  .result{
    display:block;width:100%;text-align:left;
    background:var(--surface);border:1px solid var(--hairline);
    border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px;
    transition:background .12s ease,transform .08s ease;
  }
  .result:active{background:var(--surface-2);transform:scale(.99);}
  .result-title{font-size:15px;font-weight:600;margin-bottom:2px;
     font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .result-sub{font-size:12.5px;color:var(--muted);line-height:1.4;
     font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}

  .note{font-size:13px;line-height:1.5;margin-top:16px;min-height:18px;
     font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .note.err{color:var(--danger);}
  .note.muted{color:var(--muted);}

  /* ---------- Favoriten ---------- */
  .fav-section{margin-top:26px;}
  .fav-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .fav-head .eyebrow{font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;}
  .fav-filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
  .chip{
    font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;
    font-size:11px;letter-spacing:.04em;
    background:var(--surface);border:1px solid var(--hairline);color:var(--muted);
    border-radius:var(--r-pill);padding:6px 13px;transition:all .12s ease;
  }
  .chip:active{transform:scale(.96);}
  .chip.on{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700;}
  .fav-list{list-style:none;margin:0;padding:0;}
  .fav{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:var(--surface);border:1px solid var(--hairline);
    border-radius:var(--r-sm);padding:13px 14px;margin-bottom:9px;
    transition:background .12s ease,transform .08s ease;
  }
  .fav:active{background:var(--surface-2);transform:scale(.99);}
  .fav-main{flex:1;min-width:0;text-align:left;padding:0;}
  .fav-name{display:block;font-size:15px;font-weight:600;line-height:1.3;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fav-tag{display:block;font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;
    font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-top:3px;}
  .fav-del{
    flex:0 0 auto;width:30px;height:30px;border-radius:var(--r-sm);
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:16px;line-height:1;
    background:transparent;border:1px solid var(--hairline);
  }
  .fav-del:active{color:var(--danger);border-color:var(--danger);}
  .fav-empty{font-size:13px;color:var(--muted);line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}

  /* ---------- Speichern-Dialog (Tag-Auswahl) ---------- */
  #saveSheet{
    position:fixed;inset:0;z-index:900;display:none;
    align-items:flex-end;justify-content:center;
    background:rgba(0,0,0,.55);
  }
  #saveSheet.show{display:flex;}
  .sheet{
    width:100%;max-width:440px;background:var(--surface);
    border-top-left-radius:var(--r-lg);border-top-right-radius:var(--r-lg);
    border:1px solid var(--hairline);border-bottom:none;
    padding:22px 22px calc(22px + var(--safe-b));
  }
  .sheet h2{font-size:17px;font-weight:700;margin:0 0 4px;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .sheet .sheet-sub{font-size:13px;color:var(--muted);margin:0 0 18px;line-height:1.4;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tag-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .tag-opt{
    font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;
    font-size:13px;letter-spacing:.03em;
    background:var(--bg);border:1px solid var(--hairline);color:var(--fg);
    border-radius:var(--r-sm);padding:14px;transition:all .12s ease;
  }
  .tag-opt.on{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700;}
  .sheet-actions{display:flex;gap:10px;}
  .sheet-actions .btn-ghost{flex:1;justify-content:center;text-align:center;}
  .sheet-actions .btn-go{flex:1;padding:12px 0;text-align:center;border-radius:var(--r-sm);}

  .spinner{
    width:16px;height:16px;border:2px solid var(--hairline);
    border-top-color:var(--accent);border-radius:50%;
    animation:spin .7s linear infinite;display:inline-block;vertical-align:-3px;margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Nav ---------- */
  #nav{align-items:center;justify-content:flex-start;padding:calc(var(--safe-t) + 22px) 22px 0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .nav-top{width:100%;text-align:center;padding-top:8px;}

  .compass{
    position:relative;flex:0 0 auto;width:100%;min-height:min(66vw,300px);
    margin-top:16px;
    display:flex;align-items:center;justify-content:center;
  }
  .dial{position:relative;width:min(72vw,300px);aspect-ratio:1;}
  .ring{position:absolute;inset:0;}
  .ring svg{width:100%;height:100%;display:block;}
  .needle-wrap{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    will-change:transform;
  }
  .needle-wrap svg{width:100%;height:100%;overflow:visible;}
  .needle-wrap .radar-focus{transition:filter .3s ease;filter:drop-shadow(0 0 0 rgba(0,0,0,0));}
  .needle-wrap.aligned .radar-focus{filter:drop-shadow(0 0 10px var(--glow));}

  /* SVG-Label-Ecken folgen dem Theme-Radius. */
  .dist-context{font-size:11px;letter-spacing:.06em;color:var(--muted);margin-top:6px;min-height:14px;
    max-width:min(80vw,360px);margin-left:auto;margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;text-transform:uppercase;}
  .dist-context:empty{display:none;}
  .mode-switch{display:inline-flex;margin:14px auto 2px;border:1px solid var(--hairline);border-radius:var(--r-pill);overflow:hidden;background:var(--surface);}
  .mode-seg{font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:8px 20px;color:var(--muted);background:transparent;transition:background .12s ease,color .12s ease;}
  .mode-seg.on{background:var(--accent);color:var(--bg);font-weight:700;}
  /* Pro-only Elemente in der einfachen Navi ausblenden */
  body.simple-mode #barrierInfoBtn,
  body.simple-mode #crossingPanel,
  body.simple-mode #intermediateActions{display:none !important;}

  .readout{width:100%;text-align:center;}
  .distance{font-size:50px;font-weight:700;letter-spacing:-.01em;color:var(--accent);line-height:1;}
  .distance .unit{font-size:20px;color:var(--muted);margin-left:6px;font-weight:700;}
  .status-inline{display:inline-flex;align-items:center;justify-content:center;gap:8px;margin:2px auto 0;color:var(--muted);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex:0 0 auto;}
  .dot.gps{background:var(--gps);}
  .dot.compass{background:var(--accent);}
  .dot.none{background:var(--danger);}
  #statusDot{width:8px;height:8px;flex:0 0 8px;}
  .crossing-panel{display:none;width:100%;margin:12px auto 0;background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:10px 10px 8px;}
  .crossing-panel.show{display:block;}
  .crossing-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .crossing-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .crossing-list{display:grid;gap:8px;}
  .crossing-option{width:100%;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;padding:10px;border-radius:var(--r-sm);border:1px solid var(--hairline);background:var(--bg);text-align:left;}
  .crossing-option.active{border-color:var(--accent);}
  .crossing-name{font-size:13px;font-weight:700;line-height:1.35;}
  .crossing-sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.35;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .crossing-dist{font-size:11px;color:var(--accent);letter-spacing:.06em;white-space:nowrap;padding-top:2px;}
  .crossing-sub strong{font-weight:700;color:var(--fg);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;}

  .hint{color:var(--muted);font-size:12.5px;line-height:1.5;margin-top:14px;
    max-width:280px;margin-left:auto;margin-right:auto;min-height:18px;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}

  .nav-actions{width:100%;display:flex;gap:10px;justify-content:center;
    padding:14px 0 calc(30px + var(--safe-b));}
  .power-row{width:100%;display:flex;gap:8px;justify-content:center;margin-top:auto;padding:6px 0 0;}
  .power-chip{display:inline-flex;align-items:center;gap:7px;
    font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;
    font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
    background:var(--surface);border:1px solid var(--hairline);color:var(--muted);
    border-radius:var(--r-pill);padding:8px 13px;transition:background .12s ease,border-color .12s ease,color .12s ease,transform .08s ease;}
  .power-chip:active{transform:scale(.96);}
  .power-chip .power-dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2);flex:0 0 auto;transition:background .12s ease;}
  .power-chip.on{border-color:var(--accent);color:var(--accent);}
  .power-chip.on .power-dot{background:var(--accent);}
  .power-chip.unavailable{opacity:.5;}
  .power-chip[disabled]{pointer-events:none;}
  /* Akkusparmodus: rein visuell sparsamer — kein Glow, leicht gedimmt. */
  /* Sparmodus = Eco: OLED-Schwarz, minimale leuchtende Pixel, harte Kanten. */
  body.power-saver{
    --bg:#000000;
    --surface:#000000;
    --surface-2:#0A0A0A;
    --fg:#C7C9C7;
    --accent:#3E8F63;
    --accent-2:#3E8F63;
    --gps:#3E8F63;
    --muted:#5F625F;
    --muted-2:#161616;
    --hairline:#242424;
    --danger:#7A3B37;
    --warn:#7A5A2A;
    --glow:transparent;
    --r-lg:0px;
    --r-sm:0px;
    --r-pill:0px;
  }
  body.power-saver .needle-wrap.aligned .radar-focus{filter:none;}
  .btn-ghost{
    background:var(--surface);border:1px solid var(--hairline);
    border-radius:var(--r-sm);padding:12px 18px;font-size:12.5px;font-weight:600;color:var(--fg);
    letter-spacing:.04em;text-transform:uppercase;
    transition:background .12s ease,transform .08s ease;
  }
  .btn-ghost:active{background:var(--surface-2);transform:scale(.98);}
  .btn-ghost.accent{color:var(--accent);border-color:var(--accent);}
  .btn-ghost.hide{display:none;}
  .btn-ghost[disabled]{opacity:.6;pointer-events:none;}

    .barrier-info-btn{width:100%;display:flex;align-items:center;gap:10px;justify-content:center;
    min-height:48px;padding:12px 14px;border-radius:var(--r-lg);border:1px solid var(--hairline);
    background:color-mix(in srgb, var(--surface) 92%, transparent);color:var(--warn);
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;}
  .barrier-info-btn .dot{width:10px;height:10px;border-radius:50%;background:currentColor;display:inline-block;flex:none;}
  .barrier-info-btn.hide{display:none;}
  .modal-backdrop{position:fixed;inset:0;z-index:60;background:rgba(10,12,10,.38);display:none;align-items:flex-end;justify-content:center;padding:18px;}
  .modal-backdrop.show{display:flex;}
  .modal-card{width:min(100%,560px);max-height:min(78dvh,700px);overflow:auto;background:var(--surface);
    border:1px solid var(--hairline);border-radius:var(--r-lg);box-shadow:0 18px 48px rgba(0,0,0,.18);padding:16px 16px calc(16px + var(--safe-b));}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}

<script>
"use strict";

const APP_VERSION = '2026.07.08.6';

/* ---------------- Geo-Mathe ---------------- */
const R = 6371000; // m
const toRad = d => d * Math.PI / 180;
const toDeg = r => r * 180 / Math.PI;

function bearing(lat1, lon1, lat2, lon2){
  const φ1 = toRad(lat1), φ2 = toRad(lat2), Δλ = toRad(lon2 - lon1);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}
function distance(lat1, lon1, lat2, lon2){
  const φ1 = toRad(lat1), φ2 = toRad(lat2);
  const Δφ = toRad(lat2 - lat1), Δλ = toRad(lon2 - lon1);
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function angleDelta(from, to){
  return ((to - from + 540) % 360) - 180;
}

/* ---------------- Barrieren-Check (Gewässer/Bahnlinie auf der Luftlinie) ---------------- */
// Einfacher 2D-Schnitttest. lon als x, lat als y — für die reine Kreuzungsfrage
// (kein Distanz-/Winkelbedarf) ist die fehlende cos(lat)-Skalierung unerheblich.
function ccw(a, b, c){
  return (c.lon - a.lon) * (b.lat - a.lat) - (b.lon - a.lon) * (c.lat - a.lat);
}
function segmentsIntersect(p1, p2, p3, p4){
  const d1 = ccw(p3, p4, p1), d2 = ccw(p3, p4, p2);
  const d3 = ccw(p1, p2, p3), d4 = ccw(p1, p2, p4);
  return ((d1 > 0 && d2 < 0) || (d1 < 0 && d2 > 0))
      && ((d3 > 0 && d4 < 0) || (d3 < 0 && d4 > 0));
}
function polylineCrosses(a, b, pts){
  for(let i = 0; i < pts.length - 1; i++){
    if(segmentsIntersect(a, b, pts[i], pts[i+1])) return true;
  }
  return false;
}
// Bruchteil t∈[0,1] entlang a→b, an dem die Luftlinie das Segment p3-p4 kreuzt.
function segmentCrossFraction(a, b, p3, p4){
  const rX = b.lon - a.lon, rY = b.lat - a.lat;
  const sX = p4.lon - p3.lon, sY = p4.lat - p3.lat;
  const denom = rX * sY - rY * sX;
  if(Math.abs(denom) < 1e-12) return null;
  const qpX = p3.lon - a.lon, qpY = p3.lat - a.lat;
  const t = (qpX * sY - qpY * sX) / denom;
  const u = (qpX * rY - qpY * rX) / denom;
  if(t >= 0 && t <= 1 && u >= 0 && u <= 1) return t;
  return null;
}
function polylineCrossFraction(a, b, pts){
  let best = null;
  for(let i = 0; i < pts.length - 1; i++){
    const t = segmentCrossFraction(a, b, pts[i], pts[i+1]);
    if(t != null && (best == null || t < best)) best = t;
  }
  return best;
}

async function checkBarriers(pos, dest){
  try{
    hideBarrierError();
    setBarrierDebug('Barrieren-Check startet …');
    const pad = 0.006;
    const south = Math.min(pos.lat, dest.lat) - pad;
    const north = Math.max(pos.lat, dest.lat) + pad;
    const west  = Math.min(pos.lon, dest.lon) - pad;
    const east  = Math.max(pos.lon, dest.lon) + pad;
    // Große Flüsse/Wasserflächen (z. B. Spree, Havel) sind in OSM meist als
    // Multipolygon-Relation erfasst, nicht als einfacher "way". Der einfache
    // "out geom" auf die Relation selbst liefert keine verlässliche Geometrie
    // der Mitglieder — deshalb werden die Wasser-Relationen im Suchgebiet
    // explizit aufgelöst (rel -> ihre way-Mitglieder) und deren Ways separat
    // mit voller Geometrie abgefragt.
    const query = `[out:json][timeout:25][bbox:${south},${west},${north},${east}];
(
  way["waterway"~"^(river|canal|stream|drain)$"];
  way["natural"="water"];
  way["railway"="rail"];
  way["highway"~"^(motorway|motorway_link)$"];
  node["railway"="level_crossing"];
  way["bridge"="yes"];
  way["man_made"="bridge"];
  way["tunnel"="yes"];
)->.simple;
(
  rel["natural"="water"];
  rel["waterway"~"^(river|canal)$"];
)->.waterrels;
(.simple; .waterrels;);
out geom tags;`;

    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: 'data=' + encodeURIComponent(query),
    });
    if(!res.ok){
      setBarrierDebug(`Barrieren-Check: HTTP ${res.status}`);
      setBarrierError(`Barrieren-Check fehlgeschlagen · Overpass HTTP ${res.status}`);
      console.warn('Overpass-Anfrage fehlgeschlagen', res.status);
      return;
    }
    const data = await res.json();

    let hitWater = false, hitRail = false, hitMotorway = false;
    let waterWays = 0, waterRelations = 0, railWays = 0, motorwayWays = 0, levelCrossings = 0, bridgeWays = 0;
    const barrierMarks = [];
    const direct = distance(pos.lat, pos.lon, dest.lat, dest.lon);
    const corridorM = Math.max(120, direct * 0.18);
    const candidates = [];

    const pointLineDistanceM = (a,b,p) => {
      const kx = Math.cos(((a.lat+b.lat+p.lat)/3) * Math.PI/180) * 111320;
      const ky = 110540;
      const ax = a.lon*kx, ay = a.lat*ky, bx = b.lon*kx, by = b.lat*ky, px = p.lon*kx, py = p.lat*ky;
      const abx = bx-ax, aby = by-ay, apx = px-ax, apy = py-ay;
      const ab2 = abx*abx + aby*aby || 1;
      const t = Math.max(0, Math.min(1, (apx*abx + apy*aby)/ab2));
      const cx = ax + abx*t, cy = ay + aby*t;
      return Math.hypot(px-cx, py-cy);
    };

    const isDefinitelyBlockedForCycling = (tags) => {
      const highway = tags.highway || '';
      if(highway === 'motorway' || highway === 'motorway_link') return true;
      if(tags.access === 'no') return true;
      if(tags.bicycle === 'no' && tags['bicycle:dismount'] !== 'yes' && tags['bicycle:dismount'] !== 'dismount') return true;
      return false;
    };

    const getAccessMode = (tags) => {
      const highway = tags.highway || '';
      if(highway === 'motorway' || highway === 'motorway_link') return 'blocked';
      if(tags.access === 'no' && !(tags.foot === 'yes' || tags.foot === 'designated' || tags.foot === 'permissive')) return 'blocked';
      if(tags.bicycle === 'no'){
        if(tags['bicycle:dismount'] === 'yes' || tags['bicycle:dismount'] === 'dismount' || tags.foot === 'yes' || tags.foot === 'designated' || tags.foot === 'permissive') return 'foot_only';
        return 'blocked';
      }
      if(tags.bicycle === 'dismount' || tags['bicycle:dismount'] === 'yes' || tags['bicycle:dismount'] === 'dismount') return 'foot_only';
      if(highway === 'footway' || highway === 'pedestrian'){
        if(tags.bicycle === 'yes' || tags.bicycle === 'designated' || tags.bicycle === 'permissive') return 'rideable';
        return 'foot_only';
      }
      if(highway === 'path' && !(tags.bicycle === 'yes' || tags.bicycle === 'designated' || tags.bicycle === 'permissive' || tags.cycleway)) return 'foot_only';
      return 'rideable';
    };

    const pushCandidate = (lat, lon, type, barrierType, name, tags) => {
      if(isDefinitelyBlockedForCycling(tags)) return;
      const accessMode = getAccessMode(tags);
      if(accessMode === 'blocked') return;
      const p = {lat, lon};
      const dLine = pointLineDistanceM(pos, dest, p);
      if(dLine > corridorM) return;
      const a = distance(pos.lat, pos.lon, lat, lon);
      const b = distance(lat, lon, dest.lat, dest.lon);
      const detour = Math.max(0, a + b - direct);
      if(a > direct * 1.35 || detour > Math.max(2200, direct * 1.2)) return;
      candidates.push({ lat, lon, type, barrierType, name, detour, score: detour + dLine * 0.8 + a * 0.05 + (accessMode === 'foot_only' ? 120 : 0), accessMode });
    };

    const pendingBridges = [];

    for(const element of (data.elements || [])){
      const tags = element.tags || {};

      if(element.type === 'way' && element.geometry && element.geometry.length >= 2){
        const pts = element.geometry.map(g => ({ lat: g.lat, lon: g.lon }));
        const crossesDirect = polylineCrosses(pos, dest, pts);
        if(tags.railway === 'rail') railWays++;
        if(tags.highway === 'motorway' || tags.highway === 'motorway_link') motorwayWays++;
        if(tags.waterway || tags.natural === 'water') waterWays++;
        if((tags.railway === 'rail') && crossesDirect){ hitRail = true; const tt = polylineCrossFraction(pos, dest, pts); if(tt != null) barrierMarks.push({ type:'rail', t:tt }); }
        if((tags.highway === 'motorway' || tags.highway === 'motorway_link') && crossesDirect){ hitMotorway = true; const tt = polylineCrossFraction(pos, dest, pts); if(tt != null) barrierMarks.push({ type:'motorway', t:tt }); }
        if(((tags.waterway) || tags.natural === 'water') && crossesDirect){ hitWater = true; const tt = polylineCrossFraction(pos, dest, pts); if(tt != null) barrierMarks.push({ type:'water', t:tt }); }
        if(tags.bridge === 'yes' || tags.man_made === 'bridge' || tags.tunnel === 'yes'){
          bridgeWays++;
          const mid = pts[Math.floor(pts.length / 2)];
          // barrierType wird erst NACH dem kompletten Scan zugewiesen —
          // die hit*-Flags sind hier evtl. noch unvollständig (Overpass-Reihenfolge).
          pendingBridges.push({ mid, type: tags.tunnel === 'yes' ? 'tunnel' : 'bridge', name: tags.name || '', tags });
        }
      }

      if(element.type === 'relation' && (tags.waterway || tags.natural === 'water') && Array.isArray(element.members)){
        waterRelations++;
        for(const member of element.members){
          if(member.type === 'way' && Array.isArray(member.geometry) && member.geometry.length >= 2){
            const pts = member.geometry.map(g => ({ lat: g.lat, lon: g.lon }));
            if(polylineCrosses(pos, dest, pts)){ hitWater = true; const tt = polylineCrossFraction(pos, dest, pts); if(tt != null) barrierMarks.push({ type:'water', t:tt }); }
          }
        }
      }

      if(element.type === 'node' && tags.railway === 'level_crossing'){
        levelCrossings++;
        pushCandidate(element.lat, element.lon, 'level_crossing', 'rail', tags.name || '', tags);
      }
    }

    // Jetzt sind alle hit*-Flags final — Brücken-/Tunnel-Kandidaten labeln und einreihen.
    const bridgeBarrierType = hitMotorway ? 'motorway' : (hitRail ? 'rail' : 'water');
    for(const b of pendingBridges){
      pushCandidate(b.mid.lat, b.mid.lon, b.type, bridgeBarrierType, b.name, b.tags);
    }

    const unique = new Map();
    for(const item of candidates){
      const key = crossingKey(item);
      if(!unique.has(key) || item.score < unique.get(key).score) unique.set(key, item);
    }
    state.crossingSuggestions = Array.from(unique.values()).sort((a,b)=>a.score-b.score).slice(0,5);
    // Barriere-Marken (rote Querstriche) entlang der Luftlinie zum Ziel.
    const mSeen = new Map();
    for(const m of barrierMarks){
      if(m.t < 0.02 || m.t > 0.99) continue;
      const k = m.type + ':' + m.t.toFixed(3);
      if(!mSeen.has(k)) mSeen.set(k, m);
    }
    state.barrierMarks = Array.from(mSeen.values()).sort((a,b)=>a.t-b.t).slice(0,6);
    renderBarrierMarks();
    renderCrossingSuggestions();
    showBarrierAlert(hitWater, hitRail, hitMotorway);
    setBarrierDebug(`Barrieren-Check: ok · Elemente ${data.elements?.length || 0} · Wasser-Ways ${waterWays} · Wasser-Relationen ${waterRelations} · Bahn-Ways ${railWays} · Autobahn-Ways ${motorwayWays} · Querungen ${state.crossingSuggestions.length} · Treffer Wasser ${hitWater ? 'ja' : 'nein'} · Treffer Bahn ${hitRail ? 'ja' : 'nein'} · Treffer Autobahn ${hitMotorway ? 'ja' : 'nein'}`);
  }catch(err){
    setBarrierDebug(`Barrieren-Check: Fehler · ${err && err.message ? err.message : err}`);
    setBarrierError('Barrieren-Check fehlgeschlagen – Netzwerk/Overpass prüfen.');
    console.warn('Barrieren-Check fehlgeschlagen', err);
  }
}

function crossingKey(item){ return `${item.type}:${item.lat.toFixed(5)},${item.lon.toFixed(5)}`; }
function crossingTypeLabel(type){
  if(type === 'level_crossing') return 'Bahnübergang';
  if(type === 'tunnel') return 'Tunnel';
  return 'Brücke';
}
function formatMetersShort(m){ return m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`; }
function renderNavChrome(){
  setRouteChip();
  renderCrossingSuggestions();
  syncBarrierUI();
}

function updateIntermediateActions(dist){
  const box = el('intermediateActions');
  if(!box) return;
  const active = !!state.intermediateDest;
  box.classList.toggle('hide', !active);
  // „Überspringen" ist bei aktivem Zwischenziel immer erreichbar;
  // „Zwischenziel erreicht" nur, wenn man wirklich nah dran ist.
  const near = active && Number.isFinite(dist) && dist <= 50;
  const done = el('intermediateDone');
  if(done) done.classList.toggle('hide', !near);
}
/* Hinweistext mit optionaler Haltezeit — der Frame-Loop überschreibt
   navHint sonst in jedem Frame und Meldungen wären nie sichtbar. */
function setHint(text, holdMs = 0){
  el('navHint').textContent = text;
  state.hintHoldUntil = holdMs > 0 ? Date.now() + holdMs : 0;
}
function hintLocked(){
  return Date.now() < state.hintHoldUntil;
}
function activateFinalDestination(message=''){ clearRoute(message); }

/* ---- Route aus gewählten Querungen (mehrere Wegpunkte möglich) ---- */
function crossingToWaypoint(item){
  return { lat:item.lat, lon:item.lon, name:item.name || crossingTypeLabel(item.type),
           type:item.type, barrierType:item.barrierType, accessMode:item.accessMode || 'rideable', key:crossingKey(item) };
}
function orderedSelectedCrossings(){
  const arr = Object.values(state.selectedCrossings);
  if(state.pos){
    arr.sort((a,b)=> distance(state.pos.lat,state.pos.lon,a.lat,a.lon) - distance(state.pos.lat,state.pos.lon,b.lat,b.lon));
  }
  return arr;
}
function rebuildRoute(){
  const ordered = orderedSelectedCrossings().map(crossingToWaypoint);
  if(ordered.length){
    state.intermediateDest = ordered[0];
    state.route = ordered.slice(1);
    state.selectedCrossingKey = ordered[0].key;
    state.crossingLegendMode = ordered[0].accessMode;
    state.dest = { lat:ordered[0].lat, lon:ordered[0].lon, name:ordered[0].name };
  }else{
    state.intermediateDest = null;
    state.route = [];
    state.selectedCrossingKey = null;
    state.crossingLegendMode = '';
    if(state.finalDest) state.dest = { ...state.finalDest };
  }
  state.crossingExpanded = false;
  renderNavChrome();
  renderBarrierMarks();
  renderRouteMarkers();
  updateIntermediateActions(state.intermediateDest ? Number.POSITIVE_INFINITY : null);
}
function toggleCrossing(item){
  const k = crossingKey(item);
  if(state.selectedCrossings[k]) delete state.selectedCrossings[k];
  else state.selectedCrossings[k] = item;
  setHint('');
  rebuildRoute();
}
function advanceWaypoint(message=''){
  // aktiven Wegpunkt (erreicht/übersprungen) entfernen → nächster oder Endziel
  if(state.intermediateDest && state.intermediateDest.key){
    delete state.selectedCrossings[state.intermediateDest.key];
  }
  rebuildRoute();
  if(message) setHint(message, 4000);
}
function clearRoute(message=''){
  state.selectedCrossings = {};
  rebuildRoute();
  if(message) setHint(message, 4000);
}

function setRouteChip(){

/* Rote Querstriche der Barrieren im Sweep — sichtbar solange kein Zwischenziel aktiv ist. */
function renderBarrierMarks(){
  const g = el('barrierMarks');
  if(!g) return;
  const show = state.barrierMarks.length && !state.intermediateDest;
  if(!show){ g.style.display = 'none'; g.innerHTML = ''; return; }
  const R = 94, r0 = 16, half = 8.5;
  let html = '';
  for(const m of state.barrierMarks){
    const r = r0 + m.t * (R - r0);
    const y = (100 - r).toFixed(1);
    html += `<line x1="${(100-half).toFixed(1)}" y1="${y}" x2="${(100+half).toFixed(1)}" y2="${y}" stroke="#FF3B30" stroke-width="3.4" stroke-linecap="round" opacity="0.92"/>`;
  }
  g.innerHTML = html;
  g.style.display = '';
}
/* Weitere Wegpunkte der Route (nach dem aktiven) als Marker-Pool; Position setzt der Frame-Loop. */
function renderRouteMarkers(){
  const g = el('routeMarkers');
  if(!g) return;
  const sig = state.route.map(w=>w.key).join('|');
  if(sig === state.routeSig) return;
  state.routeSig = sig;
  let html = '';
  for(let i=0;i<state.route.length;i++){
    html += `<g class="rm" style="display:none"><circle class="rm-halo" r="8" fill="var(--accent)" opacity="0.16"/><circle class="rm-dot" r="4" fill="var(--accent)"/></g>`;
  }
  g.innerHTML = html;
}
function hideSecondaryMarkers(){
  const fm = el('finalMarker'); if(fm) fm.style.display='none';
  const g = el('routeMarkers'); if(g) g.querySelectorAll('.rm').forEach(e=>e.style.display='none');
}
function positionSecondaryMarkers(pos, brg, dist){
  const finalMarker = el('finalMarker');
  const g = el('routeMarkers');
  if(!(state.intermediateDest && state.finalDest)){ hideSecondaryMarkers(); return; }
  const finalDist = distance(pos.lat,pos.lon,state.finalDest.lat,state.finalDest.lon);
  const finalRel = Math.max(0, finalDist - dist);
  const scale = Math.max(finalRel, dist*1.2, 600);
  if(g){
    const els = g.querySelectorAll('.rm');
    els.forEach((e,i)=>{
      const w = state.route[i];
      if(!w){ e.style.display='none'; return; }
      const wDist = distance(pos.lat,pos.lon,w.lat,w.lon);
      const wBear = bearing(pos.lat,pos.lon,w.lat,w.lon);
      const delta = angleDelta(brg, wBear);
      const rel = Math.max(0, wDist - dist);
      const p = radarPointFromDistanceAndAngle(rel, delta, scale, { minR:42, maxR:82 });
      e.querySelector('.rm-halo').setAttribute('cx',p.x.toFixed(1));
      e.querySelector('.rm-halo').setAttribute('cy',p.y.toFixed(1));
      e.querySelector('.rm-dot').setAttribute('cx',p.x.toFixed(1));
      e.querySelector('.rm-dot').setAttribute('cy',p.y.toFixed(1));
      e.style.display='';
    });
  }
  if(finalMarker){
    const finalBearing = bearing(pos.lat,pos.lon,state.finalDest.lat,state.finalDest.lon);
    const deltaFromActive = angleDelta(brg, finalBearing);
    const p2 = radarPointFromDistanceAndAngle(finalRel, deltaFromActive, scale, { minR:58, maxR:88 });
    finalMarker.style.display = '';
    el('finalMarkerHalo').setAttribute('cx', p2.x.toFixed(1));
    el('finalMarkerHalo').setAttribute('cy', p2.y.toFixed(1));
    el('finalMarkerDot').setAttribute('cx', p2.x.toFixed(1));
    el('finalMarkerDot').setAttribute('cy', p2.y.toFixed(1));
  }
}

function renderCrossingSuggestions(){
  const panel = el('crossingPanel');
  const list = el('crossingList');
  const summary = el('crossingSummary');
  const toggle = el('toggleCrossings');
  list.innerHTML = '';
  if(!state.crossingSuggestions.length){
    panel.classList.remove('show');
    panel.classList.add('compact');
    if(summary) summary.textContent = state.barrierMarks.length
      ? `${state.barrierMarks.length} Barriere${state.barrierMarks.length>1?'n':''} erkannt`
      : 'Querungen als Zwischenziel';
    if(toggle) toggle.textContent = 'Anzeigen';
    return;
  }
  let hasFootOnly = false, selCount = 0;
  state.crossingSuggestions.forEach(item => {
    const k = crossingKey(item);
    const selected = !!state.selectedCrossings[k];
    if(selected) selCount++;
    if(item.accessMode === 'foot_only') hasFootOnly = true;
    const btn = document.createElement('button');
    btn.className = 'crossing-option' + (selected ? ' active' : '');
    const accessText = item.accessMode === 'foot_only' ? '<strong>nur schiebend / zu Fuß</strong>' : 'mit Rad befahrbar';
    const barrierTxt = item.barrierType === 'rail' ? 'bei Bahnlinie' : (item.barrierType === 'motorway' ? 'bei Autobahn' : 'bei Gewässer');
    btn.innerHTML = `<span><div class="crossing-name">${escHtml(item.name || crossingTypeLabel(item.type))}</div><div class="crossing-sub">${crossingTypeLabel(item.type)} · ${barrierTxt} · ${accessText}</div></span><span class="crossing-dist">${selected ? '✓ ' : '+'}${formatMetersShort(item.detour)}</span>`;
    btn.addEventListener('click', () => toggleCrossing(item));
    list.appendChild(btn);
  });
  if(summary){
    summary.textContent = selCount
      ? `${state.crossingSuggestions.length} Querungen · ${selCount} gewählt`
      : `${state.crossingSuggestions.length} Querungen wählbar${hasFootOnly ? ' · teils nur schiebend' : ''}`;
  }
  if(toggle) toggle.textContent = state.crossingExpanded ? 'Einklappen' : 'Anzeigen';
  panel.classList.add('show');
  panel.classList.toggle('compact', !state.crossingExpanded);
}

  else if(hitRail && hitMotorway) state.barrierSummary = 'Bahnlinie und Autobahn zwischen hier und Ziel';
  else if(hitWater) state.barrierSummary = 'Gewässer zwischen hier und Ziel';
  else if(hitRail) state.barrierSummary = 'Bahnlinie zwischen hier und Ziel';
  else if(hitMotorway) state.barrierSummary = 'Autobahn zwischen hier und Ziel';
  else state.barrierSummary = 'Barrieren-Check ohne Treffer';

}

/* ---------------- Adresssuche (Nominatim) ---------------- */
async function geocode(query, opts = {}){
  const { near = null, limit = 6, bounded = false } = opts;
  const params = new URLSearchParams({
    format: 'jsonv2',
    addressdetails: '1',
    limit: String(limit),
    'accept-language': 'de',
    q: query
  });
  if(near && Number.isFinite(near.lat) && Number.isFinite(near.lon)){
    const latPad = 0.06;
    const lonPad = Math.max(0.08, latPad / Math.max(0.35, Math.cos(toRad(near.lat))));
    params.set('viewbox', `${(near.lon - lonPad).toFixed(6)},${(near.lat + latPad).toFixed(6)},${(near.lon + lonPad).toFixed(6)},${(near.lat - latPad).toFixed(6)}`);
    if(bounded) params.set('bounded', '1');
  }
  const url = 'https://nominatim.openstreetmap.org/search?' + params.toString();
  const res = await fetch(url, { headers:{ 'Accept':'application/json' } });
  if(!res.ok) throw new Error('geocode');
  return res.json();
}

function labelFor(item){
  const a = item.address || {};
  const line1 = [a.road, a.house_number].filter(Boolean).join(' ')
             || item.name || a.suburb || a.city || item.display_name.split(',')[0];
  const rest = item.display_name.split(',').slice(1).map(s=>s.trim());
  const line2 = [a.postcode, a.city || a.town || a.village || a.municipality,
                 a.state, a.country].filter(Boolean).join(', ') || rest.slice(0,3).join(', ');
  return { line1, line2 };
}

function normalizeSearchQuery(q){
  return (q || '')
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/str\.(?=\s|$)/gi, 'straße')
    .replace(/strasse/gi, 'straße')
    .replace(/[.,;]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function buildSuggestionQueries(q){
  const cleaned = normalizeSearchQuery(q);
  const compact = cleaned.replace(/\d+[a-z]?/gi, '').replace(/\s+/g, ' ').trim();
  const swappedUmlauts = cleaned
    .replace(/ae/gi, 'ä')
    .replace(/oe/gi, 'ö')
    .replace(/ue/gi, 'ü');
  const asciiUmlauts = cleaned
    .replace(/ä/gi, 'ae')
    .replace(/ö/gi, 'oe')
    .replace(/ü/gi, 'ue')
    .replace(/ß/g, 'ss');
  const firstPart = cleaned.split(',').map(s=>s.trim()).filter(Boolean).slice(0, 2).join(', ');
  const variants = [cleaned, swappedUmlauts, asciiUmlauts, compact, firstPart]
    .filter(Boolean)
    .filter((v, i, arr) => arr.findIndex(x => x.toLowerCase() === v.toLowerCase()) === i)
    .filter(v => v.toLowerCase() !== (q || '').trim().toLowerCase());
  return variants.slice(0, 4);
}

function resultDistance(item){
  if(!state.pos) return Number.POSITIVE_INFINITY;
  const lat = parseFloat(item.lat), lon = parseFloat(item.lon);
  if(!Number.isFinite(lat) || !Number.isFinite(lon)) return Number.POSITIVE_INFINITY;
  return distance(state.pos.lat, state.pos.lon, lat, lon);
}

function dedupeSearchResults(items){
  const seen = new Set();
  const out = [];
  items.forEach(item => {
    const lat = Number.parseFloat(item.lat);
    const lon = Number.parseFloat(item.lon);
    const key = [item.osm_type || '', item.osm_id || '', Number.isFinite(lat) ? lat.toFixed(5) : '?', Number.isFinite(lon) ? lon.toFixed(5) : '?'].join(':');
    if(seen.has(key)) return;
    seen.add(key);
    out.push(item);
  });
  return out;
}

async function searchSmart(query){
  const hasFix = !!(state.pos && Number.isFinite(state.pos.lat) && Number.isFinite(state.pos.lon));
  const localExact = hasFix ? await geocode(query, { near: state.pos, limit: 6 }) : [];
  const globalExact = await geocode(query, { limit: hasFix ? 6 : 8 });
  const sortByDistance = list => hasFix ? [...list].sort((a, b) => resultDistance(a) - resultDistance(b)) : list;
  const exact = dedupeSearchResults([...sortByDistance(localExact), ...sortByDistance(globalExact)]).slice(0, 8);
  if(exact.length){
    return { items: exact, mode: hasFix ? 'near-first' : 'exact', usedQuery: query };
  }
  const variants = buildSuggestionQueries(query);
  for(const variant of variants){
    const localVariant = hasFix ? await geocode(variant, { near: state.pos, limit: 6 }) : [];
    const globalVariant = await geocode(variant, { limit: 8 });
    const suggested = dedupeSearchResults([...sortByDistance(localVariant), ...sortByDistance(globalVariant)]).slice(0, 8);
    if(suggested.length){
      return { items: suggested, mode: 'suggest', usedQuery: variant };
    }
  }
  return { items: [], mode: 'none', usedQuery: query };
}

const qInput = el('q'), goBtn = el('go'), resultsEl = el('results'), note = el('searchNote');

async function runSearch(){
  const q = qInput.value.trim();
  if(!q) return;
  qInput.blur();
  resultsEl.innerHTML = '';
  note.className = 'note muted';
  note.innerHTML = '<span class="spinner"></span>Suche …';
  goBtn.disabled = true;
  try{
    const found = await searchSmart(q);
    goBtn.disabled = false;
    if(!found.items.length){
      note.className = 'note muted';
      note.textContent = 'Nichts gefunden. Versuch’s mit Straße + Ort oder einer etwas einfacheren Schreibweise.';
      return;
    }
    if(found.mode === 'suggest'){
      note.className = 'note muted';
      note.textContent = `Keine exakten Treffer für „${q}“. Ich zeige ähnliche Vorschläge zu „${found.usedQuery}“.`;
    }else if(found.mode === 'near-first'){
      note.className = 'note muted';
      note.textContent = 'Treffer in deiner Nähe zuerst, danach weiter entfernte passende Ergebnisse.';
    }else{
      note.textContent = '';
    }
    found.items.forEach(item=>{
      const {line1,line2} = labelFor(item);
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'result';
      btn.innerHTML = `<div class="result-title"></div><div class="result-sub"></div>`;
      let sub = line2;
      if(state.pos){
        const d = resultDistance(item);
        if(Number.isFinite(d)) sub = `${formatMetersShort(d)} entfernt · ${line2}`;
      }
      btn.querySelector('.result-title').textContent = line1;
      btn.querySelector('.result-sub').textContent = sub;
      btn.addEventListener('click', ()=> startNav({
        lat: parseFloat(item.lat), lon: parseFloat(item.lon), name: line1
      }));
      li.appendChild(btn);
      resultsEl.appendChild(li);
    });
  }catch(e){
    goBtn.disabled = false;
    note.className = 'note err';
    note.textContent = 'Suche gerade nicht erreichbar. Internetverbindung prüfen und nochmal.';
  }
}
goBtn.addEventListener('click', runSearch);

const TAGS = ['Zuhause', 'Familie', 'Freunde', 'Arbeit'];
const FAV_KEY = 'da.favorites.v1';
let activeFilter = null; // null = alle anzeigen

function loadFavorites(){
  try{
    const raw = localStorage.getItem(FAV_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(_){ return []; }
}
function saveFavorites(list){
  try{ localStorage.setItem(FAV_KEY, JSON.stringify(list)); }catch(_){ /* Speicher voll o.ä. */ }
}
function addFavorite(fav){
  const list = loadFavorites();
  // Duplikat (gleiche Koordinaten grob) vermeiden — überschreibt Tag
  const key = fav.lat.toFixed(5) + ',' + fav.lon.toFixed(5);
  const idx = list.findIndex(f => (f.lat.toFixed(5)+','+f.lon.toFixed(5)) === key);
  if(idx >= 0) list[idx] = fav; else list.unshift(fav);
  saveFavorites(list);
}
function removeFavorite(id){
  saveFavorites(loadFavorites().filter(f => f.id !== id));
  renderFavorites();
}

function renderFilters(list){
  const box = el('favFilters');
  if(!list.length){ box.innerHTML = ''; return; }
  // nur Tags anzeigen, die auch vorkommen, plus "Alle"
  const used = TAGS.filter(t => list.some(f => f.tag === t));
  let html = `<button class="chip${activeFilter===null?' on':''}" data-tag="">Alle</button>`;
  html += used.map(t => `<button class="chip${activeFilter===t?' on':''}" data-tag="${t}">${t}</button>`).join('');
  box.innerHTML = html;
  box.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      const t = chip.getAttribute('data-tag');
      activeFilter = t === '' ? null : t;
      renderFavorites();
    });
  });
}

function renderFavorites(){
  const listEl = el('favList');
  const list = loadFavorites();
  // Filter zurücksetzen, wenn sein Tag nicht mehr vorkommt (z.B. letzter Eintrag gelöscht)
  if(activeFilter && !list.some(f => f.tag === activeFilter)) activeFilter = null;
  renderFilters(list);

  if(!list.length){
    el('favSection').style.display = '';
    listEl.innerHTML = '<li class="fav-empty">Noch keine Favoriten. Beim Navigieren unten auf „Speichern" tippen.</li>';
    return;
  }
  el('favSection').style.display = '';

  const filtered = activeFilter ? list.filter(f => f.tag === activeFilter) : list;
  listEl.innerHTML = '';
  filtered.forEach(fav=>{
    const li = document.createElement('li');
    const row = document.createElement('div');
    row.className = 'fav';
    row.innerHTML = `<button class="fav-main">
        <span class="fav-name"></span>
        <span class="fav-tag"></span>
      </button>
      <button class="fav-del" aria-label="Löschen">✕</button>`;
    row.querySelector('.fav-name').textContent = fav.name;
    row.querySelector('.fav-tag').textContent = fav.tag;
    row.querySelector('.fav-main').addEventListener('click', ()=>{
      startNav({ lat: fav.lat, lon: fav.lon, name: fav.name });
    });
    row.querySelector('.fav-del').addEventListener('click', ()=>{
      removeFavorite(fav.id);
    });
    li.appendChild(row);
    listEl.appendChild(li);
  });
}

/* ---------------- Geolocation ---------------- */
function updateDerivedGpsCourse(sample){
  state.positionHistory.push(sample);
  const minTs = sample.ts - GPS_COURSE_MAX_AGE_MS;
  state.positionHistory = state.positionHistory.filter(item => item.ts >= minTs);
  let anchor = null;
  for(let i = state.positionHistory.length - 2; i >= 0; i--){
    const candidate = state.positionHistory[i];
    const spanMs = sample.ts - candidate.ts;
    if(spanMs < 1200) continue;
    const legDistance = distance(candidate.lat, candidate.lon, sample.lat, sample.lon);
    if(legDistance >= GPS_COURSE_MIN_DISTANCE){
      anchor = { candidate, spanMs, legDistance };
      break;
    }
  }
  if(!anchor){
    state.gpsCourse = null;
    state.gpsCourseSpeed = null;
    state.gpsCourseDistance = 0;
    state.gpsCourseTs = 0;
    return;
  }
  state.gpsCourse = bearing(anchor.candidate.lat, anchor.candidate.lon, sample.lat, sample.lon);
  state.gpsCourseSpeed = anchor.legDistance / Math.max(anchor.spanMs / 1000, 0.001);
  state.gpsCourseDistance = anchor.legDistance;
  state.gpsCourseTs = sample.ts;
}

function startGeolocation(){
  if(!('geolocation' in navigator)){
    setStatus('none','Ortung nicht verfügbar');
    el('navHint').textContent = 'Dieses Gerät liefert keinen Standort.';
    return;
  }
  if(state.watchId!==null) return;
  state.watchId = navigator.geolocation.watchPosition(
    p=>{
      const ts = Date.now();
      const sample = { lat:p.coords.latitude, lon:p.coords.longitude, ts };
      state.pos = { lat:sample.lat, lon:sample.lon };
      state.gpsHeading = (p.coords.heading==null || isNaN(p.coords.heading)) ? null : p.coords.heading;
      state.gpsHeadingTs = state.gpsHeading==null ? 0 : ts;
      state.gpsSpeed = (p.coords.speed==null || isNaN(p.coords.speed)) ? null : p.coords.speed;
      state.gpsAccuracy = (p.coords.accuracy==null || isNaN(p.coords.accuracy)) ? null : p.coords.accuracy;
      updateDerivedGpsCourse(sample);
    },
    err=>{
      if(err.code === err.PERMISSION_DENIED){
        setStatus('none','Standort blockiert');
        el('navHint').textContent = 'Standortfreigabe für diese Seite erlauben, dann neu laden.';
      }else{
        setStatus('none','Kein Standort');
        el('navHint').textContent = 'Standort gerade nicht verfügbar — freien Himmel suchen.';
      }
    },
    { enableHighAccuracy:true, maximumAge:1000, timeout:15000 }
  );
}

/* ---------------- Kompass (Fallback) ---------------- */
function compassJitter(history){
  if(history.length < 2) return 0;
  const base = history[0].heading;
  let min = 0, max = 0;
  for(const item of history){
    const delta = angleDelta(base, item.heading);
    if(delta < min) min = delta;
    if(delta > max) max = delta;
  }
  return max - min;
}

function onOrientation(e){
  if(typeof e.webkitCompassHeading !== 'number' || Number.isNaN(e.webkitCompassHeading)) return;
  const heading = (e.webkitCompassHeading + 360) % 360;
  const accuracy = (typeof e.webkitCompassAccuracy === 'number' && !Number.isNaN(e.webkitCompassAccuracy))
    ? Math.abs(e.webkitCompassAccuracy)
    : null;
  const ts = Date.now();
  state.compassHeading = heading;
  state.compassAccuracy = accuracy;
  state.compassTs = ts;
  state.compassHistory.push({ heading, accuracy, ts });
  state.compassHistory = state.compassHistory.filter(item => ts - item.ts <= COMPASS_MAX_AGE_MS);
}
async function requestCompass(){
  const DOE = window.DeviceOrientationEvent;
  try{
    if(DOE && typeof DOE.requestPermission === 'function'){
      const r = await DOE.requestPermission();
      if(r === 'granted'){
        window.addEventListener('deviceorientation', onOrientation, true);
        state.compassGranted = true;
        el('enableCompass').classList.add('hide');
      }else{
        el('enableCompass').classList.remove('hide');
      }
    }else if(DOE){
      window.addEventListener('deviceorientation', onOrientation, true);
      state.compassGranted = true;
    }
  }catch(_){
    el('enableCompass').classList.remove('hide');
  }
}
el('enableCompass').addEventListener('click', requestCompass);

/* ---------------- Quelle wählen (mit Hysterese) ---------------- */
function getTrustedGpsHeading(now = Date.now()){
  const headingFresh = state.gpsHeading!=null && (now - state.gpsHeadingTs) <= GPS_HEADING_MAX_AGE_MS;
  const courseFresh = state.gpsCourse!=null && (now - state.gpsCourseTs) <= GPS_COURSE_MAX_AGE_MS;
  const speed = state.gpsSpeed;
  const courseSpeed = state.gpsCourseSpeed;
  if(state.source === 'gps'){
    if(headingFresh && speed!=null && speed >= GPS_SWITCH_OFF) return { v:state.gpsHeading, detail:'coords.heading' };
    if(courseFresh && courseSpeed!=null && courseSpeed >= GPS_SWITCH_OFF) return { v:state.gpsCourse, detail:'derived-course' };
    return null;
  }
  if(headingFresh && speed!=null && speed >= GPS_SWITCH_ON) return { v:state.gpsHeading, detail:'coords.heading' };
  if(courseFresh && courseSpeed!=null && courseSpeed >= GPS_SWITCH_ON) return { v:state.gpsCourse, detail:'derived-course' };
  return null;
}

function getTrustedCompassHeading(now = Date.now()){
  if(state.compassHeading==null) return null;
  if((now - state.compassTs) > COMPASS_MAX_AGE_MS) return null;
  const history = state.compassHistory.filter(item => (now - item.ts) <= COMPASS_MAX_AGE_MS);
  if(history.length < COMPASS_MIN_SAMPLES) return null;
  const accuracyValues = history.map(item => item.accuracy).filter(v => v!=null && Number.isFinite(v));
  const accuracy = accuracyValues.length ? Math.max(...accuracyValues) : null;
  if(accuracy==null || accuracy > COMPASS_MAX_ACCURACY) return null;
  const jitter = compassJitter(history);
  if(jitter > COMPASS_MAX_JITTER) return null;
  return { v:state.compassHeading, accuracy, jitter };
}

function pickHeading(){
  const gps = getTrustedGpsHeading();
  if(gps) return {v:gps.v, s:'gps', meta:gps};
  const compass = getTrustedCompassHeading();
  if(compass) return {v:compass.v, s:'compass', meta:compass};
  return {v:null, s:'none', meta:null};
}

/* ---------------- Status-Anzeige ---------------- */
function setStatus(kind, text){
  el('statusDot').className = 'dot ' + kind;
  el('statusText').textContent = text;
}

/* ---------------- Render-Loop ---------------- */
const reduceMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

// Loop läuft nur während der Navigation — im Suchscreen spart das Akku.
let frameRunning = false;
function startFrameLoop(){ if(frameRunning) return; frameRunning = true; requestAnimationFrame(frame); }
function stopFrameLoop(){ frameRunning = false; }

function radarPointFromDistanceAndAngle(dist, relAngle, maxDist, opts = {}){
  const { minR = 14, maxR = 94 } = opts;
  const clamped = Math.max(0, Math.min(1, dist / Math.max(1, maxDist)));
  const r = minR + clamped * Math.max(0, (maxR - minR));
  const a = toRad(relAngle - 90);
  return { x: 100 + Math.cos(a) * r, y: 100 + Math.sin(a) * r, r };
}

function escHtml(s){
  return String(s || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function fmtDistance(m){
  if(m < 1000) return { val:String(Math.round(m)), unit:'m' };
  if(m < 10000) return { val:(m/1000).toFixed(2), unit:'km' };
  return { val:(m/1000).toFixed(1), unit:'km' };
}

function frame(){
  if(!frameRunning) return;
  const { dest, pos } = state;

  if(dest && pos){
    const dist = distance(pos.lat,pos.lon,dest.lat,dest.lon);
    updateIntermediateActions(state.intermediateDest ? dist : null);
    if(state.intermediateDest && dist <= 35){
      advanceWaypoint('Zwischenziel erreicht · weiter.');
      // Nur diesen Frame überspringen (dist/brg beziehen sich noch aufs alte Ziel) —
      // der Loop muss zwingend weiterlaufen.
      requestAnimationFrame(frame);
      return;
    }
    if(state.proMode && !state.barrierChecked){
      state.barrierChecked = true;
      // Nur bei realistischen Distanzen prüfen — riesige Bounding-Boxen
      // würden Overpass überfordern (Timeout/Datenmenge).
      if(dist <= 30000) checkBarriers(pos, dest);
    }
    const brg  = bearing(pos.lat,pos.lon,dest.lat,dest.lon);
    const f = fmtDistance(dist);
    el('distVal').textContent = f.val;
    el('distUnit').textContent = f.unit;
    // Kontext: zu welchem Punkt gehört die Distanz?
    const dc = el('distContext');
    if(dc){
      let ctx = '';
      if(state.intermediateDest && state.finalDest){
        ctx = 'bis Zwischenziel · ' + state.intermediateDest.name;
      }else if(state.finalDest){
        ctx = 'bis Ziel · ' + state.finalDest.name;
      }
      if(state.lastCtx !== ctx){ state.lastCtx = ctx; dc.textContent = ctx; }
    }

    const pick = pickHeading();
    state.source = pick.s;

    if(pick.v!=null){
      const factor = pick.s==='compass' ? 0.12 : 0.3;
      if(state.smoothHeading==null) state.smoothHeading = pick.v;
      state.smoothHeading = (state.smoothHeading + angleDelta(state.smoothHeading, pick.v)*factor + 360) % 360;

      const rel = (brg - state.smoothHeading + 360) % 360;
      const step = reduceMotion ? 1 : 0.22;
      state.displayAngle = (state.displayAngle + angleDelta(state.displayAngle, rel)*step + 360) % 360;

      const activeMarker = radarPointFromDistanceAndAngle(dist, 0, Math.max(dist, 1), state.intermediateDest ? { minR: 34, maxR: 60 } : { minR: 92, maxR: 92 });
      const focus = el('needleWrap').querySelector('.radar-focus');
      if(focus){
        const tipY = activeMarker.y.toFixed(1);
        const tipX = activeMarker.x.toFixed(1);
        // schmaler, symmetrischer Strahl von der Mitte zum Blip
        focus.querySelector('path').setAttribute('d', `M100 100 L${(activeMarker.x-6).toFixed(1)} ${tipY} L${(activeMarker.x+6).toFixed(1)} ${tipY} Z`);
        focus.querySelectorAll('circle')[0].setAttribute('cx', tipX);
        focus.querySelectorAll('circle')[0].setAttribute('cy', tipY);
        focus.querySelectorAll('circle')[1].setAttribute('cx', tipX);
        focus.querySelectorAll('circle')[1].setAttribute('cy', tipY);
      }

      const wrap = el('needleWrap');
      wrap.style.transform = `rotate(${state.displayAngle}deg)`;

      positionSecondaryMarkers(pos, brg, dist);

      const aligned = Math.abs(angleDelta(0, rel)) < 12;
      wrap.classList.toggle('aligned', aligned);

      if(pick.s==='gps'){
        setStatus('gps','GPS-Kurs');
        if(!hintLocked()){
          el('navHint').textContent = pick.meta && pick.meta.detail === 'derived-course'
            ? 'Richtung aus deiner Bewegung berechnet.'
            : '';
        }
      }else{
        setStatus('compass','Kompass');
        if(!hintLocked()){
          el('navHint').textContent = `Kompass-Fallback aktiv${pick.meta && Number.isFinite(pick.meta.accuracy) ? ` · ±${Math.round(pick.meta.accuracy)}°` : ''}.`;
        }
      }
    }else{
      hideSecondaryMarkers();
      setStatus('none','Richtung unklar');
      state.smoothHeading = null;
      if(!hintLocked()){
        if(state.compassGranted){
          el('navHint').textContent = 'Keine sichere Richtungsquelle. Kurz fahren oder iPhone/Kompass neu ausrichten.';
        }else{
          el('navHint').textContent = 'Keine sichere Richtungsquelle. Kurz fahren oder den iPhone-Kompass freigeben.';
        }
      }
      if(window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission==='function'
         && !state.compassGranted){
        el('enableCompass').classList.remove('hide');
      }
    }
  }else if(dest){
    setStatus('none','Suche Signal …');
    if(!hintLocked()) el('navHint').textContent = 'Warte auf ersten Standortfix …';
  }

  requestAnimationFrame(frame);
}
// Loop wird über startFrameLoop() beim Navigationsstart gestartet.

/* ---------------- Display anlassen (Wake Lock) + Sparmodus ---------------- */
(function(){
  const SAVER_KEY = 'da.saver';
  const WAKE_KEY  = 'da.wake';
  const wakeSupported = ('wakeLock' in navigator);

  function setWakeChip(){
    const chip = el('wakeToggle');
    const txt  = el('wakeToggleText');
    if(!chip) return;
    if(!wakeSupported){
      chip.classList.remove('on');
      chip.classList.add('unavailable');
      chip.setAttribute('aria-pressed','false');
      if(txt) txt.textContent = 'Display · n/v';
      return;
    }
    chip.classList.toggle('on', wakeWanted);
    chip.setAttribute('aria-pressed', wakeWanted ? 'true' : 'false');
    if(txt) txt.textContent = wakeWanted ? 'Display bleibt an' : 'Display an';
  }

  async function acquireWakeLock(){
    if(!wakeSupported || document.visibilityState !== 'visible') return;
    try{
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', ()=>{ wakeLock = null; });
    }catch(_){ wakeLock = null; }
  }

  // global sichtbar für exitToSearch()/startNav()
  releaseWakeLock = async function(){
    try{ if(wakeLock) await wakeLock.release(); }catch(_){}
    wakeLock = null;
  };
  applyWake = async function(){
    if(wakeWanted && !wakeLock) await acquireWakeLock();
    else if(!wakeWanted && wakeLock) await releaseWakeLock();
    setWakeChip();
  };

  el('wakeToggle').addEventListener('click', async ()=>{
    if(!wakeSupported){
      setHint('„Display anlassen" wird von diesem Gerät/Browser nicht unterstützt.', 4000);
      return;
    }
    wakeWanted = !wakeWanted;
    try{ localStorage.setItem(WAKE_KEY, wakeWanted ? '1' : '0'); }catch(_){}
    await applyWake();
    if(wakeWanted && !wakeLock){
      setHint('Display ließ sich nicht dauerhaft aktivieren.', 4000);
    }
  });

  // iOS gibt den Wake Lock beim Wegblenden frei — nach Rückkehr neu anfordern.
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible' && wakeWanted && !wakeLock && frameRunning) applyWake();
  });

  function applySaver(){
    document.body.classList.toggle('power-saver', saverOn);
    applyMetaThemeColor();
    const chip = el('saverToggle');
    if(chip){ chip.classList.toggle('on', saverOn); chip.setAttribute('aria-pressed', saverOn ? 'true' : 'false'); }
  }
  el('saverToggle').addEventListener('click', ()=>{
    saverOn = !saverOn;
    try{ localStorage.setItem(SAVER_KEY, saverOn ? '1' : '0'); }catch(_){}
    applySaver();
  });

  // gespeicherte Zustände laden
  try{ saverOn = localStorage.getItem(SAVER_KEY) === '1'; }catch(_){}
  try{ wakeWanted = wakeSupported && localStorage.getItem(WAKE_KEY) === '1'; }catch(_){}
  applySaver();
  setWakeChip();
})();

/* ---------------- Modus: Einfach / Pro ---------------- */
(function(){
  function applyMode(){
    document.body.classList.toggle('pro-mode', state.proMode);
    document.body.classList.toggle('simple-mode', !state.proMode);
    const s = el('modeSimple'), p = el('modePro');
    if(s) s.classList.toggle('on', !state.proMode);
    if(p) p.classList.toggle('on', state.proMode);
  }
  window.__applyMode = applyMode;
  function setMode(pro){
    if(state.proMode === pro){ applyMode(); return; }
    state.proMode = pro;
    try{ localStorage.setItem('da.pro', pro ? '1' : '0'); }catch(_){}
    if(!pro){
      // Einfache Navi: Route/Barrieren verwerfen → direkt zum Ziel.
      state.selectedCrossings = {}; state.route = []; state.barrierMarks = []; state.routeSig = '';
      state.intermediateDest = null; state.selectedCrossingKey = null; state.crossingLegendMode = '';
      state.crossingSuggestions = [];
      if(state.finalDest) state.dest = { ...state.finalDest };
      renderNavChrome(); renderBarrierMarks(); renderRouteMarkers();
      updateIntermediateActions(null); hideSecondaryMarkers();
      setHint('Einfache Navi · direkt zum Ziel.', 3000);
    }else{
      // Pro: Barrieren neu prüfen.
      state.barrierChecked = false;
      setHint('Pro-Navi · Barrieren-Check läuft …', 3000);
    }
    applyMode();
  }
  el('modeSimple').addEventListener('click', ()=>setMode(false));
  el('modePro').addEventListener('click', ()=>setMode(true));
  try{ state.proMode = localStorage.getItem('da.pro') === '1'; }catch(_){}
  applyMode();
})();

/* ---------------- Theme Toggle ---------------- */
(function(){
  const THEME_KEY = 'da.theme';
  const root = document.documentElement;
  const toggleBtn = document.getElementById('themeToggle');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
  let theme = null; // null = folgt Systemeinstellung
  try{ const s = localStorage.getItem(THEME_KEY); if(s === 'light' || s === 'dark') theme = s; }catch(_){}

  function applyTheme(){
    if(theme === null){
      root.removeAttribute('data-theme');
    }else{
      root.setAttribute('data-theme', theme);
    }
    const isDark = theme === null ? systemDark.matches : theme === 'dark';
    toggleBtn.setAttribute('aria-label', isDark ? 'Zu Light Mode wechseln' : 'Zu Dark Mode wechseln');
    applyMetaThemeColor();
  }

  toggleBtn.addEventListener('click', ()=>{
    const currentlyDark = theme === null ? systemDark.matches : theme === 'dark';
    theme = currentlyDark ? 'light' : 'dark';
    try{ localStorage.setItem(THEME_KEY, theme); }catch(_){}
    applyTheme();
  });

  systemDark.addEventListener?.('change', ()=>{ if(theme === null) applyTheme(); });
  applyTheme();
})();

</script>
