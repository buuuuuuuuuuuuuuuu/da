<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="da" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<link rel="icon" type="image/png" href="./favicon.png" />
<meta name="color-scheme" content="dark light" />
<meta name="theme-color" content="#04120A" />
<title>da</title>
<style>
  :root{
    --bg:#04120A;
    --surface:#0A1F14;
    --surface-2:#123322;
    --fg:#CFFFE6;
    --accent:#6BFFB0;
    --gps:#4ADE80;
    --muted:#3E6E55;
    --muted-2:#1E3E2C;
    --hairline:rgba(107,255,176,.16);
    --danger:#FF6B6B;
    --warn:#FFB454;
    --glow:rgba(107,255,176,.4);
    --safe-t:env(safe-area-inset-top);
    --safe-b:env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme]){
      --bg:#EFE9D8;
      --surface:#E6DFC9;
      --surface-2:#DCD4BA;
      --fg:#2B2118;
      --accent:#2B2118;
      --gps:#3E6B4F;
      --muted:#A79B7E;
      --muted-2:#D6CDAF;
      --hairline:rgba(43,33,24,.16);
      --danger:#B3261E;
      --warn:#8A5A00;
      --glow:rgba(43,33,24,.22);
    }
  }
  :root[data-theme="light"]{
    --bg:#EFE9D8;
    --surface:#E6DFC9;
    --surface-2:#DCD4BA;
    --fg:#2B2118;
    --accent:#2B2118;
    --gps:#3E6B4F;
    --muted:#A79B7E;
    --muted-2:#D6CDAF;
    --hairline:rgba(43,33,24,.16);
    --danger:#B3261E;
    --warn:#8A5A00;
    --glow:rgba(43,33,24,.22);
  }
  :root[data-theme="dark"]{
    --bg:#04120A;
    --surface:#0A1F14;
    --surface-2:#123322;
    --fg:#CFFFE6;
    --accent:#6BFFB0;
    --gps:#4ADE80;
    --muted:#3E6E55;
    --muted-2:#1E3E2C;
    --hairline:rgba(107,255,176,.16);
    --danger:#FF6B6B;
    --warn:#FFB454;
    --glow:rgba(107,255,176,.4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    display:flex;flex-direction:column;
    padding:var(--safe-t) 0 var(--safe-b);
  }
  button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer;}
  .eyebrow{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);font-weight:600;
  }

  /* ---------- Update-Banner ---------- */
  #updateBanner{
    position:fixed;top:0;left:0;right:0;z-index:1000;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:calc(var(--safe-t) + 10px) 18px 10px;
    background:var(--surface-2);border-bottom:1px solid var(--hairline);
    transform:translateY(-100%);transition:transform .25s ease;
  }
  #updateBanner.show{transform:translateY(0);}
  #updateBanner span{font-size:12px;color:var(--fg);letter-spacing:.02em;}
  #updateBanner button{
    background:var(--accent);color:var(--bg);font-weight:700;
    font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    border-radius:6px;padding:7px 14px;flex:0 0 auto;
  }
  body.has-banner #search{padding-top:calc(var(--safe-t) + 62px);transition:padding-top .25s ease;}
  body.has-banner #nav{padding-top:76px;transition:padding-top .25s ease;}

  #themeToggle{
    position:fixed;top:calc(var(--safe-t) + 10px);left:14px;
    z-index:20;width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:color-mix(in srgb, var(--surface) 88%, transparent);
    border:1px solid var(--hairline);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    transition:background .2s ease,border-color .2s ease;
  }
  #themeToggle:active{transform:scale(.94);}
  #themeToggle svg{width:18px;height:18px;stroke:var(--fg);fill:none;stroke-width:1.6;}
  #themeToggle .icon-moon{display:none;}
  :root[data-theme="light"] #themeToggle .icon-sun{display:none;}
  :root[data-theme="light"] #themeToggle .icon-moon{display:block;}
  @media (prefers-color-scheme: light){
    :root:not([data-theme]) #themeToggle .icon-sun{display:none;}
    :root:not([data-theme]) #themeToggle .icon-moon{display:block;}
  }

  #reloadTopBtn{
    position:fixed;top:calc(var(--safe-t) + 10px);left:58px;
    z-index:20;width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:color-mix(in srgb, var(--surface) 88%, transparent);
    border:1px solid var(--hairline);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    transition:background .2s ease,transform .2s ease;
  }
  #reloadTopBtn:active{transform:scale(.94) rotate(-25deg);}
  #reloadTopBtn svg{width:17px;height:17px;stroke:var(--fg);fill:none;stroke-width:1.8;}

  .nav-top{position:relative;}
  #closeNavBtn{
    position:absolute;top:2px;right:2px;
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--surface);border:1px solid var(--hairline);
  }
  #closeNavBtn:active{background:var(--surface-2);transform:scale(.94);}
  #closeNavBtn svg{width:15px;height:15px;stroke:var(--fg);fill:none;stroke-width:2;}

  #versionTag{
    position:fixed;left:0;right:0;bottom:calc(var(--safe-b) + 10px);
    text-align:center;font-size:9.5px;letter-spacing:.08em;
    color:var(--muted);opacity:.55;pointer-events:none;z-index:5;
    padding-top:10px;
  }

  /* ---------- Views ---------- */
  .view{position:absolute;inset:0;display:none;flex-direction:column;}
  .view.active{display:flex;}

  /* ---------- Search ---------- */
  #search{padding:calc(var(--safe-t) + 8px) 22px calc(var(--safe-b) + 34px);overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .search-inner{width:100%;max-width:440px;margin:auto;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:30px;}
  .brand-mark{width:24px;height:24px;flex:0 0 auto;}
  .brand-mark svg{width:100%;height:100%;display:block;}
  .brand-name{font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
  h1{font-size:22px;line-height:1.3;margin:0 0 8px;font-weight:700;letter-spacing:-.01em;
     font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .sub{color:var(--muted);font-size:14px;line-height:1.55;margin:0 0 26px;
       font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .field{display:flex;gap:10px;}
  input[type=text]{
    flex:1;min-width:0;background:var(--surface);color:var(--fg);
    border:1px solid var(--hairline);border-radius:10px;
    padding:15px 16px;font-size:16px;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    outline:none;transition:border-color .15s ease;
  }
  input[type=text]:focus{border-color:var(--accent);}
  input::placeholder{color:var(--muted);}
  .btn-go{
    flex:0 0 auto;background:var(--accent);color:var(--bg);
    border-radius:10px;padding:0 20px;font-size:14px;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;
    transition:opacity .15s ease,transform .08s ease;
  }
  .btn-go:active{transform:scale(.97);}
  .btn-go[disabled]{opacity:.45;pointer-events:none;}

  .results{list-style:none;margin:18px 0 0;padding:0;}
  .result{
    display:block;width:100%;text-align:left;
    background:var(--surface);border:1px solid var(--hairline);
    border-radius:10px;padding:14px 16px;margin-bottom:10px;
    transition:background .12s ease,transform .08s ease;
  }
  .result:active{background:var(--surface-2);transform:scale(.99);}
  .result-title{font-size:15px;font-weight:600;margin-bottom:2px;
     font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .result-sub{font-size:12.5px;color:var(--muted);line-height:1.4;
     font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}

  .note{font-size:13px;line-height:1.5;margin-top:16px;min-height:18px;
     font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .note.err{color:var(--danger);}
  .note.muted{color:var(--muted);}

  /* ---------- Favoriten ---------- */
  .fav-section{margin-top:26px;}
  .fav-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .fav-head .eyebrow{font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;}
  .fav-filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
  .chip{
    font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;
    font-size:11px;letter-spacing:.04em;
    background:var(--surface);border:1px solid var(--hairline);color:var(--muted);
    border-radius:999px;padding:6px 13px;transition:all .12s ease;
  }
  .chip:active{transform:scale(.96);}
  .chip.on{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700;}
  .fav-list{list-style:none;margin:0;padding:0;}
  .fav{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:var(--surface);border:1px solid var(--hairline);
    border-radius:10px;padding:13px 14px;margin-bottom:9px;
    transition:background .12s ease,transform .08s ease;
  }
  .fav:active{background:var(--surface-2);transform:scale(.99);}
  .fav-main{flex:1;min-width:0;text-align:left;padding:0;}
  .fav-name{display:block;font-size:15px;font-weight:600;line-height:1.3;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fav-tag{display:block;font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;
    font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-top:3px;}
  .fav-del{
    flex:0 0 auto;width:30px;height:30px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:16px;line-height:1;
    background:transparent;border:1px solid var(--hairline);
  }
  .fav-del:active{color:var(--danger);border-color:var(--danger);}
  .fav-empty{font-size:13px;color:var(--muted);line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}

  /* ---------- Speichern-Dialog (Tag-Auswahl) ---------- */
  #saveSheet{
    position:fixed;inset:0;z-index:900;display:none;
    align-items:flex-end;justify-content:center;
    background:rgba(0,0,0,.55);
  }
  #saveSheet.show{display:flex;}
  .sheet{
    width:100%;max-width:440px;background:var(--surface);
    border-top-left-radius:18px;border-top-right-radius:18px;
    border:1px solid var(--hairline);border-bottom:none;
    padding:22px 22px calc(22px + var(--safe-b));
  }
  .sheet h2{font-size:17px;font-weight:700;margin:0 0 4px;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .sheet .sheet-sub{font-size:13px;color:var(--muted);margin:0 0 18px;line-height:1.4;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tag-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .tag-opt{
    font-family:ui-monospace,"SF Mono",Menlo,"Liberation Mono",monospace;
    font-size:13px;letter-spacing:.03em;
    background:var(--bg);border:1px solid var(--hairline);color:var(--fg);
    border-radius:10px;padding:14px;transition:all .12s ease;
  }
  .tag-opt.on{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700;}
  .sheet-actions{display:flex;gap:10px;}
  .sheet-actions .btn-ghost{flex:1;justify-content:center;text-align:center;}
  .sheet-actions .btn-go{flex:1;padding:12px 0;text-align:center;border-radius:8px;}

  .spinner{
    width:16px;height:16px;border:2px solid var(--hairline);
    border-top-color:var(--accent);border-radius:50%;
    animation:spin .7s linear infinite;display:inline-block;vertical-align:-3px;margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Nav ---------- */
  #nav{align-items:center;justify-content:space-between;padding:22px 22px 0;}
  .nav-top{width:100%;text-align:center;padding-top:8px;}
  .dest-name{font-size:16px;font-weight:700;margin-top:6px;line-height:1.35;
    max-width:90%;margin-left:auto;margin-right:auto;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .compass{
    position:relative;flex:1 1 auto;width:100%;
    display:flex;align-items:center;justify-content:center;
  }
  .dial{position:relative;width:min(78vw,330px);aspect-ratio:1;}
  .ring{position:absolute;inset:0;}
  .ring svg{width:100%;height:100%;display:block;}
  .needle-wrap{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    will-change:transform;
  }
  .needle-wrap svg{width:100%;height:100%;overflow:visible;}
  .needle-wrap .radar-focus{transition:filter .3s ease;filter:drop-shadow(0 0 0 rgba(0,0,0,0));}
  .needle-wrap.aligned .radar-focus{filter:drop-shadow(0 0 10px var(--glow));}

  .readout{width:100%;text-align:center;}
  .distance{font-size:50px;font-weight:700;letter-spacing:-.01em;color:var(--accent);line-height:1;}
  .distance .unit{font-size:20px;color:var(--muted);margin-left:6px;font-weight:700;}

  .status{
    display:inline-flex;align-items:center;gap:8px;margin-top:16px;
    background:var(--surface);border:1px solid var(--hairline);
    border-radius:6px;padding:6px 12px;font-size:11px;color:var(--muted);
    letter-spacing:.1em;text-transform:uppercase;
  }
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex:0 0 auto;}
  .dot.gps{background:var(--gps);}
  .dot.compass{background:var(--accent);}
  .dot.none{background:var(--danger);}

  .alert{
    display:inline-flex;align-items:center;gap:7px;margin-top:10px;
    background:var(--surface);border:1px solid var(--warn);
    border-radius:6px;padding:6px 12px;font-size:11.5px;color:var(--warn);
    letter-spacing:.03em;max-width:280px;
  }
  .alert.hide{display:none;}
  .alert .dot{background:var(--warn);}
  .crossing-panel{display:none;margin:12px auto 0;max-width:320px;background:var(--surface);border:1px solid var(--hairline);border-radius:10px;padding:10px 10px 8px;}
  .crossing-panel.show{display:block;}
  .crossing-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .crossing-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .crossing-list{display:grid;gap:8px;}
  .crossing-option{width:100%;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;padding:10px;border-radius:8px;border:1px solid var(--hairline);background:var(--bg);text-align:left;}
  .crossing-option.active{border-color:var(--accent);}
  .crossing-name{font-size:13px;font-weight:700;line-height:1.35;}
  .crossing-sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.35;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}
  .crossing-dist{font-size:11px;color:var(--accent);letter-spacing:.06em;white-space:nowrap;padding-top:2px;}
  .route-chip{display:none;align-items:center;justify-content:center;gap:7px;margin-top:10px;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
  .route-chip.show{display:inline-flex;}
  .crossing-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:6px 10px;border-radius:999px;border:1px solid var(--hairline);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .crossing-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .crossing-badge.foot-only .dot{background:var(--warn);}
  .crossing-sub strong{font-weight:700;color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;}

  .hint{color:var(--muted);font-size:12.5px;line-height:1.5;margin-top:14px;
    max-width:280px;margin-left:auto;margin-right:auto;min-height:18px;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;}

  .nav-actions{width:100%;display:flex;gap:10px;justify-content:center;
    padding:18px 0 calc(34px + var(--safe-b));}
  .btn-ghost{
    background:var(--surface);border:1px solid var(--hairline);
    border-radius:8px;padding:12px 18px;font-size:12.5px;font-weight:600;color:var(--fg);
    letter-spacing:.04em;text-transform:uppercase;
    transition:background .12s ease,transform .08s ease;
  }
  .btn-ghost:active{background:var(--surface-2);transform:scale(.98);}
  .btn-ghost.accent{color:var(--accent);border-color:var(--accent);}
  .btn-ghost.hide{display:none;}
  .btn-ghost[disabled]{opacity:.6;pointer-events:none;}

  @media (prefers-reduced-motion:reduce){
    .spinner{animation:none;}
  }
</style>
</head>
<body>

  <button id="themeToggle" type="button" aria-label="Farbmodus umschalten">
    <svg class="icon-sun" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <button id="reloadTopBtn" type="button" aria-label="App neu laden">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
      <polyline points="21 3 21 9 15 9"/>
    </svg>
  </button>

  <div id="updateBanner">
    <span>Neue Version verfügbar</span>
    <button id="reloadBtn">Jetzt laden</button>
  </div>

  <div id="versionTag"></div>

  <!-- ============ SEARCH VIEW ============ -->
  <section id="search" class="view active">
    <div class="search-inner">
      <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#3E6E55" stroke-width="1.2"/>
            <circle cx="12" cy="12" r="6"  stroke="#3E6E55" stroke-width="1.2"/>
            <circle cx="12" cy="6" r="1.8" fill="#6BFFB0"/>
          </svg>
        </span>
        <span class="brand-name">da</span>
      </div>

      <h1>Wohin soll's gehen?</h1>
      <p class="sub">Gib ein Ziel ein. Der Pfeil zeigt dann immer dorthin — Karte gibt's keine.</p>

      <div class="field">
        <input id="q" type="text" inputmode="search" enterkeyhint="search"
               autocomplete="off" autocorrect="off" spellcheck="false"
               placeholder="Adresse, Straße, Ort …" />
        <button id="go" class="btn-go">Suchen</button>
      </div>

      <ul id="results" class="results"></ul>
      <div id="searchNote" class="note muted"></div>

      <div id="favSection" class="fav-section">
        <div class="fav-head">
          <span class="eyebrow">Favoriten</span>
        </div>
        <div id="favFilters" class="fav-filters"></div>
        <ul id="favList" class="fav-list"></ul>
      </div>
    </div>
  </section>

  <!-- ============ NAV VIEW ============ -->
  <section id="nav" class="view">
    <div class="nav-top">
      <button id="closeNavBtn" type="button" aria-label="Navigation beenden">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="5" x2="19" y2="19"/>
          <line x1="19" y1="5" x2="5" y2="19"/>
        </svg>
      </button>
      <div class="eyebrow">Ziel</div>
      <div id="destName" class="dest-name">—</div>
    </div>

    <div class="compass">
      <div class="dial">
        <div class="ring">
          <svg viewBox="0 0 200 200" aria-hidden="true">
            <circle cx="100" cy="100" r="94" fill="none" stroke="var(--muted-2)" stroke-width="1"/>
            <circle cx="100" cy="100" r="64" fill="none" stroke="var(--muted-2)" stroke-width="1"/>
            <circle cx="100" cy="100" r="34" fill="none" stroke="var(--muted-2)" stroke-width="1"/>
            <line x1="100" y1="4"   x2="100" y2="14"  stroke="var(--muted)" stroke-width="1.5"/>

<script>
"use strict";

const APP_VERSION = '2026.07.06.6';

/* ---------------- Geo-Mathe ---------------- */
const R = 6371000; // m
const toRad = d => d * Math.PI / 180;
const toDeg = r => r * 180 / Math.PI;

function bearing(lat1, lon1, lat2, lon2){
  const φ1 = toRad(lat1), φ2 = toRad(lat2), Δλ = toRad(lon2 - lon1);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}
function distance(lat1, lon1, lat2, lon2){
  const φ1 = toRad(lat1), φ2 = toRad(lat2);
  const Δφ = toRad(lat2 - lat1), Δλ = toRad(lon2 - lon1);
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function angleDelta(from, to){
  return ((to - from + 540) % 360) - 180;
}

/* ---------------- Barrieren-Check (Gewässer/Bahnlinie auf der Luftlinie) ---------------- */
// Einfacher 2D-Schnitttest. lon als x, lat als y — für die reine Kreuzungsfrage
// (kein Distanz-/Winkelbedarf) ist die fehlende cos(lat)-Skalierung unerheblich.
function ccw(a, b, c){
  return (c.lon - a.lon) * (b.lat - a.lat) - (b.lon - a.lon) * (c.lat - a.lat);
}
function segmentsIntersect(p1, p2, p3, p4){
  const d1 = ccw(p3, p4, p1), d2 = ccw(p3, p4, p2);
  const d3 = ccw(p1, p2, p3), d4 = ccw(p1, p2, p4);
  return ((d1 > 0 && d2 < 0) || (d1 < 0 && d2 > 0))
      && ((d3 > 0 && d4 < 0) || (d3 < 0 && d4 > 0));
}
function polylineCrosses(a, b, pts){
  for(let i = 0; i < pts.length - 1; i++){
    if(segmentsIntersect(a, b, pts[i], pts[i+1])) return true;
  }
  return false;
}

async function checkBarriers(pos, dest){
  try{
    const pad = 0.006;
    const south = Math.min(pos.lat, dest.lat) - pad;
    const north = Math.max(pos.lat, dest.lat) + pad;
    const west  = Math.min(pos.lon, dest.lon) - pad;
    const east  = Math.max(pos.lon, dest.lon) + pad;
    // Große Flüsse/Wasserflächen (z. B. Spree, Havel) sind in OSM meist als
    // Multipolygon-Relation erfasst, nicht als einfacher "way". Der einfache
    // "out geom" auf die Relation selbst liefert keine verlässliche Geometrie
    // der Mitglieder — deshalb werden die Wasser-Relationen im Suchgebiet
    // explizit aufgelöst (rel -> ihre way-Mitglieder) und deren Ways separat
    // mit voller Geometrie abgefragt.
    const query = `[out:json][timeout:25][bbox:${south},${west},${north},${east}];
(
  way["waterway"~"^(river|canal|stream|drain)$"];
  way["natural"="water"];
  way["railway"="rail"];
  node["railway"="level_crossing"];
  way["bridge"="yes"];
  way["man_made"="bridge"];
  way["tunnel"="yes"];
)->.simple;
(
  rel["natural"="water"];
  rel["waterway"~"^(river|canal)$"];
)->.waterrels;
way(r.waterrels)->.relways;
(.simple; .relways;);
out geom tags;`;

    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: 'data=' + encodeURIComponent(query),
    });
    if(!res.ok){
      console.warn('Overpass-Anfrage fehlgeschlagen', res.status);
      return;
    }
    const data = await res.json();

    let hitWater = false, hitRail = false;
    const direct = distance(pos.lat, pos.lon, dest.lat, dest.lon);
    const corridorM = Math.max(120, direct * 0.18);
    const candidates = [];

    const pointLineDistanceM = (a,b,p) => {
      const kx = Math.cos(((a.lat+b.lat+p.lat)/3) * Math.PI/180) * 111320;
      const ky = 110540;
      const ax = a.lon*kx, ay = a.lat*ky, bx = b.lon*kx, by = b.lat*ky, px = p.lon*kx, py = p.lat*ky;
      const abx = bx-ax, aby = by-ay, apx = px-ax, apy = py-ay;
      const ab2 = abx*abx + aby*aby || 1;
      const t = Math.max(0, Math.min(1, (apx*abx + apy*aby)/ab2));
      const cx = ax + abx*t, cy = ay + aby*t;
      return Math.hypot(px-cx, py-cy);
    };

    const isDefinitelyBlockedForCycling = (tags) => {
      const highway = tags.highway || '';
      if(highway === 'motorway' || highway === 'motorway_link') return true;
      if(tags.access === 'no') return true;
      if(tags.bicycle === 'no' && tags['bicycle:dismount'] !== 'yes' && tags['bicycle:dismount'] !== 'dismount') return true;
      return false;
    };

    const getAccessMode = (tags) => {
      const highway = tags.highway || '';
      if(highway === 'motorway' || highway === 'motorway_link') return 'blocked';
      if(tags.access === 'no' && !(tags.foot === 'yes' || tags.foot === 'designated' || tags.foot === 'permissive')) return 'blocked';
      if(tags.bicycle === 'no'){
        if(tags['bicycle:dismount'] === 'yes' || tags['bicycle:dismount'] === 'dismount' || tags.foot === 'yes' || tags.foot === 'designated' || tags.foot === 'permissive') return 'foot_only';
        return 'blocked';
      }
      if(tags.bicycle === 'dismount' || tags['bicycle:dismount'] === 'yes' || tags['bicycle:dismount'] === 'dismount') return 'foot_only';
      if(highway === 'footway' || highway === 'pedestrian'){
        if(tags.bicycle === 'yes' || tags.bicycle === 'designated' || tags.bicycle === 'permissive') return 'rideable';
        return 'foot_only';
      }
      if(highway === 'path' && !(tags.bicycle === 'yes' || tags.bicycle === 'designated' || tags.bicycle === 'permissive' || tags.cycleway)) return 'foot_only';
      return 'rideable';
    };

    const pushCandidate = (lat, lon, type, barrierType, name, tags) => {
      if(isDefinitelyBlockedForCycling(tags)) return;
      const accessMode = getAccessMode(tags);
      if(accessMode === 'blocked') return;
      const p = {lat, lon};
      const dLine = pointLineDistanceM(pos, dest, p);
      if(dLine > corridorM) return;
      const a = distance(pos.lat, pos.lon, lat, lon);
      const b = distance(lat, lon, dest.lat, dest.lon);
      const detour = Math.max(0, a + b - direct);
      if(a > direct * 1.35 || detour > Math.max(2200, direct * 1.2)) return;
      candidates.push({ lat, lon, type, barrierType, name, detour, score: detour + dLine * 0.8 + a * 0.05 + (accessMode === 'foot_only' ? 120 : 0), accessMode });
    };

    for(const element of (data.elements || [])){
      const tags = element.tags || {};

      if(element.type === 'way' && element.geometry && element.geometry.length >= 2){
        const pts = element.geometry.map(g => ({ lat: g.lat, lon: g.lon }));
        if((tags.railway === 'rail') && polylineCrosses(pos, dest, pts)) hitRail = true;
        if(((tags.waterway) || tags.natural === 'water') && polylineCrosses(pos, dest, pts)) hitWater = true;
        if(tags.bridge === 'yes' || tags.man_made === 'bridge' || tags.tunnel === 'yes'){
          const mid = pts[Math.floor(pts.length / 2)];
          const barrierType = tags.railway ? 'rail' : (tags.waterway || tags.natural === 'water' ? 'water' : (hitRail && !hitWater ? 'rail' : 'water'));
          pushCandidate(mid.lat, mid.lon, tags.tunnel === 'yes' ? 'tunnel' : 'bridge', barrierType, tags.name || '', tags);
        }
      }

      if(element.type === 'node' && tags.railway === 'level_crossing'){
        pushCandidate(element.lat, element.lon, 'level_crossing', 'rail', tags.name || '', tags);
      }
    }

    const unique = new Map();
    for(const item of candidates){
      const key = crossingKey(item);
      if(!unique.has(key) || item.score < unique.get(key).score) unique.set(key, item);
    }
    state.crossingSuggestions = Array.from(unique.values()).sort((a,b)=>a.score-b.score).slice(0,5);
    renderCrossingSuggestions();
    showBarrierAlert(hitWater, hitRail);
  }catch(err){
    console.warn('Barrieren-Check fehlgeschlagen', err);
  }
}

function crossingKey(item){ return `${item.type}:${item.lat.toFixed(5)},${item.lon.toFixed(5)}`; }
function crossingTypeLabel(type){
  if(type === 'level_crossing') return 'Bahnübergang';
  if(type === 'tunnel') return 'Tunnel';
  return 'Brücke';
}
function formatMetersShort(m){ return m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`; }
function setRouteChip(){
  const chip = el('routeChip');
  if(state.intermediateDest && state.finalDest){
    chip.textContent = `Zwischenziel aktiv · danach ${state.finalDest.name}`;
    chip.classList.add('show');
  }else if(state.finalDest){
    chip.textContent = `Endziel · ${state.finalDest.name}`;
    chip.classList.add('show');
  }else{
    chip.textContent = '';
    chip.classList.remove('show');
  }
}
function renderCrossingSuggestions(){
  const panel = el('crossingPanel');
  const list = el('crossingList');
  const legend = el('crossingLegend');
  const legendText = el('crossingLegendText');
  list.innerHTML = '';
  if(!state.crossingSuggestions.length){
    panel.classList.remove('show');
    legend.hidden = true;
    legend.classList.remove('foot-only');
    return;
  }
  let hasFootOnly = false;
  state.crossingSuggestions.forEach(item => {
    if(item.accessMode === 'foot_only') hasFootOnly = true;
    const btn = document.createElement('button');
    btn.className = 'crossing-option' + (state.selectedCrossingKey === crossingKey(item) ? ' active' : '');
    const accessText = item.accessMode === 'foot_only' ? '<strong>nur schiebend / zu Fuß</strong>' : 'mit Rad befahrbar';
    btn.innerHTML = `<span><div class="crossing-name">${item.name || crossingTypeLabel(item.type)}</div><div class="crossing-sub">${crossingTypeLabel(item.type)} · ${item.barrierType === 'rail' ? 'bei Bahnlinie' : 'bei Gewässer'} · ${accessText}</div></span><span class="crossing-dist">+${formatMetersShort(item.detour)}</span>`;
    btn.addEventListener('click', () => {
      state.intermediateDest = { lat:item.lat, lon:item.lon, name:item.name || crossingTypeLabel(item.type) };
      state.selectedCrossingKey = crossingKey(item);
      state.dest = { ...state.intermediateDest };
      el('destName').textContent = `${state.intermediateDest.name} · Zwischenziel`;
      state.crossingLegendMode = item.accessMode || 'rideable';
      setRouteChip();
      renderCrossingSuggestions();
    });
    list.appendChild(btn);
  });
  legend.hidden = false;
  if(state.crossingLegendMode === 'foot_only' || (!state.selectedCrossingKey && hasFootOnly)){
    legend.classList.add('foot-only');
    legendText.textContent = 'Gelb = nur schiebend / zu Fuß nutzbar';
  }else{
    legend.classList.remove('foot-only');
    legendText.textContent = 'Querungen sind für Radfahrt freigegeben';
  }
  panel.classList.add('show');
}
function showBarrierAlert(hitWater, hitRail){
  const box = el('barrierAlert');
  if(!hitWater && !hitRail){ box.classList.add('hide'); return; }
  let msg;
  if(hitWater && hitRail) msg = 'Gewässer und Bahnlinie zwischen hier und Ziel';
  else if(hitWater) msg = 'Gewässer zwischen hier und Ziel';
  else msg = 'Bahnlinie zwischen hier und Ziel';
  el('barrierText').textContent = msg + ' · Querung als Zwischenziel wählen';
  box.classList.remove('hide');
}

/* ---------------- State ---------------- */
const state = {
  dest: null,
  pos: null,
  gpsHeading: null,
  gpsSpeed: null,
  compassHeading: null,
  source: 'none',
  smoothHeading: null,
  displayAngle: 0,
  watchId: null,
  compassGranted: false,
  barrierChecked: false,
  lastBlip: null,
  finalDest: null,
  intermediateDest: null,
  crossingSuggestions: [],
  selectedCrossingKey: null,
  crossingLegendMode: '',
};

const GPS_SWITCH_ON  = 1.0;
const GPS_SWITCH_OFF = 0.5;

/* ---------------- Elemente ---------------- */
const el = id => document.getElementById(id);
el('versionTag').textContent = 'da · v' + APP_VERSION;
const views = { search: el('search'), nav: el('nav') };
function show(name){
  Object.values(views).forEach(v => v.classList.remove('active'));
  views[name].classList.add('active');
}

/* ---------------- Adresssuche (Nominatim) ---------------- */
async function geocode(query){
  const url = 'https://nominatim.openstreetmap.org/search?format=jsonv2'
            + '&addressdetails=1&limit=6&accept-language=de&q=' + encodeURIComponent(query);
  const res = await fetch(url, { headers:{ 'Accept':'application/json' } });
  if(!res.ok) throw new Error('geocode');
  return res.json();
}

function labelFor(item){
  const a = item.address || {};
  const line1 = [a.road, a.house_number].filter(Boolean).join(' ')
             || item.name || a.suburb || a.city || item.display_name.split(',')[0];
  const rest = item.display_name.split(',').slice(1).map(s=>s.trim());
  const line2 = [a.postcode, a.city || a.town || a.village || a.municipality,
                 a.state, a.country].filter(Boolean).join(', ') || rest.slice(0,3).join(', ');
  return { line1, line2 };
}

const qInput = el('q'), goBtn = el('go'), resultsEl = el('results'), note = el('searchNote');

async function runSearch(){
  const q = qInput.value.trim();
  if(!q) return;
  qInput.blur(); // iOS-Tastatur einklappen
  resultsEl.innerHTML = '';
  note.className = 'note muted';
  note.innerHTML = '<span class="spinner"></span>Suche …';
  goBtn.disabled = true;
  try{
    const items = await geocode(q);
    goBtn.disabled = false;
    if(!items.length){
      note.className = 'note muted';
      note.textContent = 'Nichts gefunden. Straße und Ort etwas anders formulieren?';
      return;
    }
    note.textContent = '';
    items.forEach(item=>{
      const {line1,line2} = labelFor(item);
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'result';
      btn.innerHTML = `<div class="result-title"></div><div class="result-sub"></div>`;
      btn.querySelector('.result-title').textContent = line1;
      btn.querySelector('.result-sub').textContent = line2;
      btn.addEventListener('click', ()=> startNav({
        lat: parseFloat(item.lat), lon: parseFloat(item.lon), name: line1
      }));
      li.appendChild(btn);
      resultsEl.appendChild(li);
    });
  }catch(e){
    goBtn.disabled = false;
    note.className = 'note err';
    note.textContent = 'Suche gerade nicht erreichbar. Internetverbindung prüfen und nochmal.';
  }
}
goBtn.addEventListener('click', runSearch);
qInput.addEventListener('keydown', e=>{ if(e.key==='Enter') runSearch(); });

/* ---------------- Navigation starten ---------------- */
function startNav(dest){
  state.dest = dest;
  state.barrierChecked = false;
  el('barrierAlert').classList.add('hide');
  el('destName').textContent = dest.name;
  show('nav');
  requestCompass().finally(startGeolocation);
}

el('changeDest').addEventListener('click', ()=>{
  if(state.watchId!==null){ navigator.geolocation.clearWatch(state.watchId); state.watchId=null; }
  resultsEl.innerHTML=''; note.textContent=''; qInput.value = state.dest?.name || '';
  show('search'); qInput.focus();
  renderFavorites();
});

el('closeNavBtn').addEventListener('click', ()=>{
  if(state.watchId!==null){ navigator.geolocation.clearWatch(state.watchId); state.watchId=null; }
  state.dest = null;
  state.finalDest = null;
  state.intermediateDest = null;
  state.crossingSuggestions = [];
  state.selectedCrossingKey = null;
  state.barrierChecked = false;
  el('barrierAlert').classList.add('hide');
  renderCrossingSuggestions();
  setRouteChip();
  resultsEl.innerHTML=''; note.textContent=''; qInput.value = '';
  show('search'); qInput.focus();
  renderFavorites();
});

el('reloadTopBtn').addEventListener('click', ()=>{
  const url = location.pathname + '?_=' + Date.now();
  location.replace(url);
});

/* ---------------- Favoriten ---------------- */
const TAGS = ['Zuhause', 'Familie', 'Freunde', 'Arbeit'];
const FAV_KEY = 'da.favorites.v1';
let activeFilter = null; // null = alle anzeigen

function loadFavorites(){
  try{
    const raw = localStorage.getItem(FAV_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(_){ return []; }
}
function saveFavorites(list){
  try{ localStorage.setItem(FAV_KEY, JSON.stringify(list)); }catch(_){ /* Speicher voll o.ä. */ }
}
function addFavorite(fav){
  const list = loadFavorites();
  // Duplikat (gleiche Koordinaten grob) vermeiden — überschreibt Tag
  const key = fav.lat.toFixed(5) + ',' + fav.lon.toFixed(5);
  const idx = list.findIndex(f => (f.lat.toFixed(5)+','+f.lon.toFixed(5)) === key);
  if(idx >= 0) list[idx] = fav; else list.unshift(fav);
  saveFavorites(list);
}
function removeFavorite(id){
  saveFavorites(loadFavorites().filter(f => f.id !== id));
  renderFavorites();
}

function renderFilters(list){
  const box = el('favFilters');
  if(!list.length){ box.innerHTML = ''; return; }
  // nur Tags anzeigen, die auch vorkommen, plus "Alle"
  const used = TAGS.filter(t => list.some(f => f.tag === t));
  let html = `<button class="chip${activeFilter===null?' on':''}" data-tag="">Alle</button>`;
  html += used.map(t => `<button class="chip${activeFilter===t?' on':''}" data-tag="${t}">${t}</button>`).join('');
  box.innerHTML = html;
  box.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      const t = chip.getAttribute('data-tag');
      activeFilter = t === '' ? null : t;
      renderFavorites();
    });
  });
}

function renderFavorites(){
  const listEl = el('favList');
  const list = loadFavorites();
  // Filter zurücksetzen, wenn sein Tag nicht mehr vorkommt (z.B. letzter Eintrag gelöscht)
  if(activeFilter && !list.some(f => f.tag === activeFilter)) activeFilter = null;
  renderFilters(list);

  if(!list.length){
    el('favSection').style.display = '';
    listEl.innerHTML = '<li class="fav-empty">Noch keine Favoriten. Beim Navigieren unten auf „Speichern" tippen.</li>';
    return;
  }
  el('favSection').style.display = '';

  const filtered = activeFilter ? list.filter(f => f.tag === activeFilter) : list;
  listEl.innerHTML = '';
  filtered.forEach(fav=>{
    const li = document.createElement('li');
    const row = document.createElement('div');
    row.className = 'fav';
    row.innerHTML = `<button class="fav-main">
        <span class="fav-name"></span>
        <span class="fav-tag"></span>
      </button>
      <button class="fav-del" aria-label="Löschen">✕</button>`;
    row.querySelector('.fav-name').textContent = fav.name;
    row.querySelector('.fav-tag').textContent = fav.tag;
    row.querySelector('.fav-main').addEventListener('click', ()=>{
      startNav({ lat: fav.lat, lon: fav.lon, name: fav.name });
    });
    row.querySelector('.fav-del').addEventListener('click', ()=>{
      removeFavorite(fav.id);
    });
    li.appendChild(row);
    listEl.appendChild(li);
  });
}

/* ----- Speichern-Sheet (Tag-Auswahl) ----- */
let pendingTag = null;

function openSaveSheet(){
  if(!state.dest) return;
  pendingTag = null;
  el('saveSheetSub').textContent = state.dest.name;
  const grid = el('tagGrid');
  grid.innerHTML = TAGS.map(t => `<button class="tag-opt" data-tag="${t}">${t}</button>`).join('');
  grid.querySelectorAll('.tag-opt').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      pendingTag = opt.getAttribute('data-tag');
      grid.querySelectorAll('.tag-opt').forEach(o=>o.classList.remove('on'));
      opt.classList.add('on');
    });
  });
  // "Zuhause" sichtbar vorauswählen — Anzeige und Ergebnis stimmen so immer überein
  pendingTag = TAGS[0];
  grid.querySelector('.tag-opt').classList.add('on');
  el('saveSheet').classList.add('show');
}
function closeSaveSheet(){ el('saveSheet').classList.remove('show'); }

el('saveFav').addEventListener('click', openSaveSheet);
el('saveCancel').addEventListener('click', closeSaveSheet);
el('saveSheet').addEventListener('click', (e)=>{ if(e.target.id === 'saveSheet') closeSaveSheet(); });
el('saveConfirm').addEventListener('click', ()=>{
  if(!state.dest) return closeSaveSheet();
  const tag = pendingTag || TAGS[0];
  addFavorite({
    id: 'f' + Date.now(),
    name: state.dest.name,
    lat: state.dest.lat,
    lon: state.dest.lon,
    tag,
  });
  closeSaveSheet();
  const b = el('saveFav');
  b.textContent = 'Gespeichert ✓';
  b.disabled = true;
  setTimeout(()=>{ b.textContent = 'Speichern'; b.disabled = false; }, 1500);
});

renderFavorites();

/* ---------------- Geolocation ---------------- */
function startGeolocation(){
  if(!('geolocation' in navigator)){
    setStatus('none','Ortung nicht verfügbar');
    el('navHint').textContent = 'Dieses Gerät liefert keinen Standort.';
    return;
  }
  if(state.watchId!==null) return;
  state.watchId = navigator.geolocation.watchPosition(
    p=>{
      state.pos = { lat:p.coords.latitude, lon:p.coords.longitude };
      state.gpsHeading = (p.coords.heading==null || isNaN(p.coords.heading)) ? null : p.coords.heading;
      state.gpsSpeed   = (p.coords.speed==null   || isNaN(p.coords.speed))   ? null : p.coords.speed;
    },
    err=>{
      if(err.code === err.PERMISSION_DENIED){
        setStatus('none','Standort blockiert');
        el('navHint').textContent = 'Standortfreigabe für diese Seite erlauben, dann neu laden.';
      }else{
        setStatus('none','Kein Standort');
        el('navHint').textContent = 'Standort gerade nicht verfügbar — freien Himmel suchen.';
      }
    },
    { enableHighAccuracy:true, maximumAge:1000, timeout:15000 }
  );
}

/* ---------------- Kompass (Fallback) ---------------- */
function onOrientation(e){
  if(typeof e.webkitCompassHeading === 'number' && !isNaN(e.webkitCompassHeading)){
    state.compassHeading = e.webkitCompassHeading;
  }else if(e.alpha!=null){
    state.compassHeading = (360 - e.alpha) % 360;
  }
}
async function requestCompass(){
  const DOE = window.DeviceOrientationEvent;
  try{
    if(DOE && typeof DOE.requestPermission === 'function'){
      const r = await DOE.requestPermission();
      if(r === 'granted'){
        window.addEventListener('deviceorientation', onOrientation, true);
        state.compassGranted = true;
        el('enableCompass').classList.add('hide');
      }else{
        el('enableCompass').classList.remove('hide');
      }
    }else if(DOE){
      window.addEventListener('deviceorientation', onOrientation, true);
      state.compassGranted = true;
    }
  }catch(_){
    el('enableCompass').classList.remove('hide');
  }
}
el('enableCompass').addEventListener('click', requestCompass);

/* ---------------- Quelle wählen (mit Hysterese) ---------------- */
function pickHeading(){
  const hasGps = state.gpsHeading!=null;
  const spd = state.gpsSpeed;
  if(state.source==='gps'){
    if(hasGps && (spd==null || spd>GPS_SWITCH_OFF)) return {v:state.gpsHeading, s:'gps'};
  }else{
    if(hasGps && spd!=null && spd>GPS_SWITCH_ON) return {v:state.gpsHeading, s:'gps'};
  }
  if(state.compassHeading!=null) return {v:state.compassHeading, s:'compass'};
  if(hasGps) return {v:state.gpsHeading, s:'gps'};
  return {v:null, s:'none'};
}

/* ---------------- Status-Anzeige ---------------- */
function setStatus(kind, text){
  el('statusDot').className = 'dot ' + kind;
  el('statusText').textContent = text;
}

/* ---------------- Render-Loop ---------------- */
const reduceMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

function fmtDistance(m){
  if(m < 1000) return { val:String(Math.round(m)), unit:'m' };
  if(m < 10000) return { val:(m/1000).toFixed(2), unit:'km' };
  return { val:(m/1000).toFixed(1), unit:'km' };
}

function frame(){
  const { dest, pos } = state;

  if(dest && pos){
    const dist = distance(pos.lat,pos.lon,dest.lat,dest.lon);
    if(!state.barrierChecked){
      state.barrierChecked = true;
      // Nur bei realistischen Distanzen prüfen — riesige Bounding-Boxen
      // würden Overpass überfordern (Timeout/Datenmenge).
      if(dist <= 30000) checkBarriers(pos, dest);
    }
    const brg  = bearing(pos.lat,pos.lon,dest.lat,dest.lon);
    const f = fmtDistance(dist);
    el('distVal').textContent = f.val;
    el('distUnit').textContent = f.unit;
    const blipTxt = f.val + ' ' + f.unit;
    if(state.lastBlip !== blipTxt){
      state.lastBlip = blipTxt;
      const t = el('blipLabelText');
      t.textContent = blipTxt;
      const w = Math.ceil(t.getComputedTextLength()) + 14;
      el('blipLabelRect').setAttribute('width', w);
      t.setAttribute('x', 106 + w/2);
    }

    const pick = pickHeading();
    state.source = pick.s;

    if(pick.v!=null){
      const factor = pick.s==='compass' ? 0.15 : 0.35;
      if(state.smoothHeading==null) state.smoothHeading = pick.v;
      state.smoothHeading = (state.smoothHeading + angleDelta(state.smoothHeading, pick.v)*factor + 360) % 360;

      const rel = (brg - state.smoothHeading + 360) % 360;
      const step = reduceMotion ? 1 : 0.22;
      state.displayAngle = (state.displayAngle + angleDelta(state.displayAngle, rel)*step + 360) % 360;

      const wrap = el('needleWrap');
      wrap.style.transform = `rotate(${state.displayAngle}deg)`;
      el('blipLabel').setAttribute('transform', `rotate(${-state.displayAngle} 100 6)`);
      const aligned = Math.abs(angleDelta(0, rel)) < 12;
      wrap.classList.toggle('aligned', aligned);

      if(pick.s==='gps'){ setStatus('gps','GPS-Kurs'); el('navHint').textContent=''; }
      else { setStatus('compass','Kompass'); el('navHint').textContent=''; }
    }else{
      setStatus('none','Richtung fehlt');
      el('navHint').textContent = state.compassGranted
        ? 'Losfahren, damit sich der Pfeil an der Bewegung ausrichtet.'
        : 'Losfahren oder oben den Kompass aktivieren.';
      if(window.DeviceOrientationEvent && typeof window.DeviceOrientationEvent.requestPermission==='function'
         && !state.compassGranted){
        el('enableCompass').classList.remove('hide');
      }
    }
  }else if(dest){
    setStatus('none','Suche Signal …');
    el('navHint').textContent = 'Warte auf ersten Standortfix …';
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------------- Versions-Check ---------------- */
async function checkVersion(){
  try{
    const res = await fetch('./version.json?t=' + Date.now(), { cache:'no-store' });
    if(!res.ok) return;
    const data = await res.json();
    if(data.version && data.version !== APP_VERSION){
      el('updateBanner').classList.add('show');
      document.body.classList.add('has-banner');
    }
  }catch(_){ /* offline o.ä. — einfach ignorieren */ }
}
el('reloadBtn').addEventListener('click', ()=>{
  // Harter, cache-umgehender Reload: eigene URL ohne Query + Cache-Buster,
  // damit garantiert die neueste index.html geholt wird und nicht eine
  // evtl. vom Browser/iOS zwischengespeicherte alte Fassung.
  const url = location.pathname + '?_=' + Date.now();
  location.replace(url);
});

checkVersion();
setInterval(checkVersion, 5 * 60 * 1000); // alle 5 Minuten
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible') checkVersion();
});

/* ---------------- Service Worker ---------------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{ /* SW optional — App läuft auch ohne */ });
  });
}

/* ---------------- Theme Toggle ---------------- */
(function(){
  const root = document.documentElement;
  const toggleBtn = document.getElementById('themeToggle');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
  let theme = null; // null = folgt Systemeinstellung

  function applyTheme(){
    if(theme === null){
      root.removeAttribute('data-theme');
    }else{
      root.setAttribute('data-theme', theme);
    }
    const isDark = theme === null ? systemDark.matches : theme === 'dark';
    toggleBtn.setAttribute('aria-label', isDark ? 'Zu Light Mode wechseln' : 'Zu Dark Mode wechseln');
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if(metaTheme) metaTheme.setAttribute('content', isDark ? '#04120A' : '#EFE9D8');
  }

  toggleBtn.addEventListener('click', ()=>{
    const currentlyDark = theme === null ? systemDark.matches : theme === 'dark';
    theme = currentlyDark ? 'light' : 'dark';
    applyTheme();
  });

  systemDark.addEventListener?.('change', ()=>{ if(theme === null) applyTheme(); });
  applyTheme();
})();

</script>
